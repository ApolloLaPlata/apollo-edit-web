<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta Apollo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0510;
            --panel-bg: #140b2e;
            --neon-purple: #8b5cf6;
            --neon-cyan: #00f0ff;
            --neon-gold: #fbbf24;
        }

        body {
            background-image: url('assets/bg_timeline.png');
            background-size: cover;
            background-position: center;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .box-container {
            background: rgba(20, 11, 46, 0.9);
            border: 4px solid var(--neon-purple);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(139, 92, 246, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 900;
        }

        .roulette-container {
            position: relative;
            width: 350px;
            height: 350px;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff0055;
            z-index: 10;
            filter: drop-shadow(0 0 5px #ff0055);
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid var(--neon-purple);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.5);
            overflow: hidden;
            position: relative;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
            background: conic-gradient(
                #8b5cf6 0deg 60deg,
                #fbbf24 60deg 120deg,
                #00f0ff 120deg 180deg,
                #ff0055 180deg 240deg,
                #10b981 240deg 300deg,
                #6366f1 300deg 360deg
            );
        }

        .slice-img {
            position: absolute;
            top: 15%; left: 50%;
            width: 50px; height: 50px;
            margin-left: -25px; /* center horizontally */
            transform-origin: 50% 122.5px; /* rotate around center of wheel */
            z-index: 2;
        }

        .wheel-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            background: #140b2e;
            border-radius: 50%;
            border: 3px solid var(--neon-cyan);
            z-index: 5;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .slice-text {
            position: absolute;
            top: 50%; left: 50%;
            transform-origin: 0 0;
            font-weight: bold;
            font-size: 14px;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }

        .spin-btn {
            margin-top: 50px;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(90deg, #f59e0b, #d97706);
            border: 2px solid #b45309;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
            transition: transform 0.2s;
        }

        .spin-btn:hover {
            transform: scale(1.05);
        }

        .spin-btn:disabled {
            background: #555;
            border-color: #333;
            cursor: not-allowed;
            box-shadow: none;
            color: #888;
        }

        #result {
            margin-top: 20px;
            font-size: 1.5rem;
            color: var(--neon-cyan);
            font-weight: bold;
            height: 30px;
        }
    </style>
</head>
<body>

    <div class="box-container">
        <h1>Roleta da Sorte</h1>

        <div class="roulette-container">
            <div class="pointer"></div>
            <div class="wheel" id="wheel">
                <!-- Texts and Images added via JS to align properly -->
            </div>
            <div class="wheel-center"></div>
        </div>

        <div id="result"></div>

        <button class="spin-btn" id="spin-btn" onclick="spinWheel()">GIRAR</button>
    </div>

    <script>
        const prizes = [
            "Nitro", 
            "Cristal Sombrio", 
            "Super Roda", 
            "Motor V8", 
            "Capacete", 
            "Gasolina"
        ];
        
        const prizeImages = [
            "assets/final_pieces/battery.png",
            "assets/final_pieces/wrench.png",
            "assets/final_pieces/wheel.png",
            "assets/final_pieces/engine.png",
            "assets/final_icons/helmet.png",
            "assets/final_pieces/gascan.png"
        ];
        
        const wheel = document.getElementById('wheel');
        const resultDisplay = document.getElementById('result');
        const spinBtn = document.getElementById('spin-btn');
        let currentRotation = 0;

        // Add text and images to slices
        for(let i=0; i<6; i++) {
            // Add Text
            const el = document.createElement('div');
            el.className = 'slice-text';
            const angle = (i * 60) + 30;
            el.style.transform = `rotate(${angle - 90}deg) translate(90px, -50%)`; // Pushed text further out
            el.innerText = prizes[i];
            wheel.appendChild(el);

            // Add Image
            const img = document.createElement('img');
            img.src = prizeImages[i];
            img.className = 'slice-img';
            // 350px wheel -> center is 175px. 175px - 50px (image height) = 125px transform origin
            img.style.transformOrigin = `50% 125px`; 
            img.style.transform = `rotate(${angle}deg)`;
            wheel.appendChild(img);
        }

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playTick() {
            try {
                if (!audioCtx) audioCtx = new AudioContext();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } catch(e){}
        }
        function playWin() {
            try {
                if (!audioCtx) audioCtx = new AudioContext();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } catch(e){}
        }

        function spinWheel() {
            spinBtn.disabled = true;
            resultDisplay.innerText = "Girando...";
            
            // Random degrees between 1800 and 3600 (5 to 10 spins)
            const spinDegrees = Math.floor(Math.random() * 1800) + 1800; 
            currentRotation += spinDegrees;
            
            wheel.style.transform = `rotate(${currentRotation}deg)`;
            
            // Simulate ticking sound
            let tickCount = 0;
            let tickInt = setInterval(() => {
                playTick();
                tickCount++;
                if (tickCount > 20) clearInterval(tickInt);
            }, 150);

            setTimeout(() => {
                // Calculate prize
                const normalizedRot = currentRotation % 360;
                // Since 0deg is top, the pointer is at 0 (or 360).
                // The wheel rotates clockwise.
                // Slice 0: 0-60
                // Slice 1: 60-120
                // To find what is under pointer (top): 360 - normalizedRot
                const pointerAngle = (360 - normalizedRot) % 360;
                const winningIndex = Math.floor(pointerAngle / 60);
                
                resultDisplay.innerText = `Prêmio: ${prizes[winningIndex]}`;
                playWin();
                spinBtn.disabled = false;
            }, 4000); // 4s matches CSS transition
        }
    </script>
</body>
</html>
