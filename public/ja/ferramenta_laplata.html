<html lang="pt-br">
<head>
<link href="../global_style.css" rel="stylesheet"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Apollo Edit — La Plata (IA)</title>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            color: #F0F0F0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        
        .main-container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: calc(100vh - 120px);
        }
        
        .laplata-panel {
            flex: 1;
            background: #1e1e1e;
            border: 2px solid #9B59B6;
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 0 20px rgba(155, 89, 182, 0.2);
        }
        
        .laplata-header {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(155, 89, 182, 0.3);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        
        .laplata-header h3 { margin: 0; font-size: 24px; color: #fff; }
        .laplata-header p { margin: 5px 0 0 0; color: #aaa; font-size: 14px; }
        
        .laplata-icon {
            font-size: 40px;
            color: #9B59B6;
            text-shadow: 0 0 10px rgba(155, 89, 182, 0.5);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .input-group label {
            font-size: 14px;
            font-weight: 600;
            color: #ccc;
        }

        .input-group input[type="text"], 
        .input-group input[type="number"], 
        .input-group select,
        .input-group textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(155, 89, 182, 0.4);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus, 
        .input-group select:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #9B59B6;
            background: rgba(155, 89, 182, 0.1);
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .checkbox-item:hover {
            border-color: #9B59B6;
        }

        .checkbox-item input[type="checkbox"] {
            accent-color: #9B59B6;
            width: 18px;
            height: 18px;
        }

        .btn-laplata {
            background: linear-gradient(135deg, #8b5cf6, #9B59B6);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4);
        }
        
        .btn-laplata:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.6);
        }

        .result-area {
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed #9B59B6;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            min-height: 100px;
            color: #ccc;
        }

        .result-content {
            font-size: 15px;
            line-height: 1.6;
            color: #fff;
            white-space: pre-wrap;
        }

        .copy-btn {
            background: rgba(155, 89, 182, 0.2);
            color: #9B59B6;
            border: 1px solid rgba(155, 89, 182, 0.4);
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            transition: 0.2s;
        }

        .copy-btn:hover {
            background: #9B59B6;
            color: white;
        }

        /* Loading */
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center;
            flex-direction: column; z-index: 200;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #444;
            border-top-color: #9B59B6; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="global-3d-bg"></div>
<header style="padding: 10px 30px; margin-bottom: 20px;">
<div class="top-nav" style="flex-grow: 1; display: flex; align-items: center; justify-content: flex-start; gap: 20px;">
<a href="hub.html" style="text-decoration: none;">
<div class="main-logo"><span>APOLLO</span> EDIT WEB</div>
</a>
<span class="badge" style="background: rgba(155,89,182,0.2); color: #9B59B6; padding: 4px 8px; border-radius: 4px; border: 1px solid #9B59B6;">🚀 La Plata IA</span>
</div>
</header>
<div class="main-container">
<div class="laplata-panel" id="tool-container">
 Conteúdo será injetado pelo laplata_integration.js 
</div>
</div>
 LOADING SCREEN 
<div class="loading-overlay" id="loading">
<div class="spinner"></div>
<h3 style="color: #9B59B6; margin: 0; text-shadow: 0 0 10px rgba(155,89,182,0.5);">Processando Inteligência Artificial...</h3>
</div>
 Notification Toast 
<div id="notification" style="position: fixed; top: 20px; right: -300px; background: #9B59B6; color: white; padding: 15px 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; z-index: 9999; display: flex; align-items: center; gap: 10px;">
<i class="fas fa-info-circle"></i>
<span id="notif-text">Mensagem</span>
</div>
<script src="../laplata_integration.js"></script>
<script src="../bg_parallax.js"></script>
</body>
</html>
