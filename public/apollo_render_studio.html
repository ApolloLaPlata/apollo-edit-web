<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo Render Studio | Extreme Speed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --surface-color: rgba(20, 20, 25, 0.7);
            --primary: #6d28d9;
            --primary-glow: #8b5cf6;
            --accent: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(109, 40, 217, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(6, 182, 212, 0.15), transparent 25%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        .sidebar {
            width: 380px;
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 2rem;
            background: linear-gradient(135deg, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, textarea, input[type="range"] {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 1rem;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(109, 40, 217, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            line-height: 1.5;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slider-value {
            color: var(--accent);
            font-weight: bold;
            font-size: 0.9rem;
        }

        .btn-generate {
            background: linear-gradient(135deg, var(--primary), var(--primary-glow));
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(109, 40, 217, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 1rem;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(109, 40, 217, 0.4);
        }

        .btn-generate:active {
            transform: translateY(1px);
        }

        .main-content {
            flex: 1;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .viewer-container {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16/9;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
            opacity: 0.5;
        }

        .placeholder i {
            font-size: 4rem;
        }

        .placeholder p {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
        }

        video, img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(109, 40, 217, 0.2);
            border-top-color: var(--primary-glow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .status-text {
            color: var(--accent);
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            animation: pulse 1.5s infinite;
        }
        
        .timer-text {
            color: var(--text-muted);
            font-family: monospace;
            font-size: 1rem;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .metrics-bar {
            margin-top: 2rem;
            display: flex;
            gap: 2rem;
            padding: 1rem 2rem;
            background: rgba(20, 20, 25, 0.5);
            border: 1px solid var(--border);
            border-radius: 100px;
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .metric {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .metric span {
            color: var(--text-main);
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
        }

        .metric i { color: var(--accent); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="header">
            <h1>Apollo Studio</h1>
            <p><i class="fa-solid fa-bolt"></i> Ultra Fast Render Engine</p>
        </div>

        <div class="form-group">
            <label>Modelo (Engine)</label>
            <select id="model-select">
                <option value="LTX-2.3-Diffusers">LTX 2.3 Video (Com Áudio)</option>
                <option value="Wan-14B">Wan 2.1 14B Video</option>
                <option value="Flux-Dev">Flux Dev (Imagem Realista)</option>
                <option value="Flux-Schnell">Flux Schnell (Imagem Fast)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Prompt Principal</label>
            <textarea id="prompt" placeholder="Descreva a cena em detalhes cinemáticos... Ex: A neon-lit cyberpunk city street, raining, 4k resolution, highly detailed, vivid colors"></textarea>
        </div>

        <div class="form-group">
            <label>Negative Prompt (Evitar Bonecos)</label>
            <textarea id="negative-prompt">worst quality, inconsistent, blurry, deformed, plastic, doll, 3d render, cg, fake, painting</textarea>
        </div>

        <div class="form-group">
            <label>Qualidade & Resolução</label>
            <select id="quality-select">
                <option value="fast">Fast (480p - Ultra Rápido)</option>
                <option value="hd">HD (720p - Equilibrado)</option>
                <option value="fhd">Full HD (1080p - Demorado)</option>
            </select>
        </div>

        <div class="form-group">
            <div class="slider-header">
                <label>Passos Neurais (Steps)</label>
                <span class="slider-value" id="steps-value">30</span>
            </div>
            <input type="range" id="steps-slider" min="10" max="60" value="30">
        </div>

        <button class="btn-generate" id="generate-btn">
            <i class="fa-solid fa-wand-magic-sparkles"></i> Renderizar
        </button>
    </aside>

    <main class="main-content">
        <div class="viewer-container" id="viewer-container">
            <div class="placeholder" id="placeholder">
                <i class="fa-solid fa-film"></i>
                <p>Nenhuma mídia renderizada</p>
            </div>
            
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <div class="status-text">Renderizando na Modal (H100)...</div>
                <div class="timer-text" id="timer">0.0s</div>
            </div>

            <video id="video-player" controls loop></video>
            <img id="image-player" alt="Render">
        </div>

        <div class="metrics-bar" id="metrics">
            <div class="metric"><i class="fa-solid fa-stopwatch"></i> Tempo: <span id="metric-time">--</span></div>
            <div class="metric"><i class="fa-solid fa-microchip"></i> Modelo: <span id="metric-model">--</span></div>
            <div class="metric"><i class="fa-solid fa-stairs"></i> Steps: <span id="metric-steps">--</span></div>
            <div class="metric" id="metric-warm"></div>
        </div>
    </main>

    <script>
        const API_URL = "https://roxingo--apollo-render-router";

        const btn = document.getElementById('generate-btn');
        const loader = document.getElementById('loader');
        const placeholder = document.getElementById('placeholder');
        const videoPlayer = document.getElementById('video-player');
        const imagePlayer = document.getElementById('image-player');
        const timerText = document.getElementById('timer');
        const metrics = document.getElementById('metrics');
        
        const stepsSlider = document.getElementById('steps-slider');
        const stepsValue = document.getElementById('steps-value');

        let timerInterval;

        stepsSlider.addEventListener('input', (e) => {
            stepsValue.textContent = e.target.value;
        });

        btn.addEventListener('click', async () => {
            const model = document.getElementById('model-select').value;
            const prompt = document.getElementById('prompt').value;
            const negPrompt = document.getElementById('negative-prompt').value;
            const quality = document.getElementById('quality-select').value;
            const steps = parseInt(stepsSlider.value);

            if(!prompt) { alert('Digite um prompt!'); return; }

            // UI Reset
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processando...';
            placeholder.style.display = 'none';
            videoPlayer.style.opacity = '0';
            imagePlayer.style.opacity = '0';
            setTimeout(() => { videoPlayer.style.display = 'none'; imagePlayer.style.display = 'none'; }, 300);
            loader.style.display = 'flex';
            metrics.style.opacity = '0';

            const isVideo = model.includes('LTX') || model.includes('Wan');
            const endpoint = isVideo ? '/api/generate_video' : '/api/generate_image';
            const route = `${API_URL}${endpoint.replace(/\//g, '-')}.modal.run`;

            let seconds = 0;
            timerText.textContent = '0.0s';
            const statusEl = loader.querySelector('.status-text');
            statusEl.textContent = 'Aquecendo o Motor na GPU (Pode demorar no 1º Vídeo)...';
            
            timerInterval = setInterval(() => {
                seconds += 0.1;
                timerText.textContent = seconds.toFixed(1) + 's';
                if (seconds > 10 && seconds < 11) {
                    statusEl.textContent = 'Gerando frames em VRAM...';
                }
            }, 100);

            try {
                const startTime = performance.now();
                
                const response = await fetch(route, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: model,
                        prompt: prompt,
                        negative_prompt: negPrompt,
                        quality: quality,
                        steps: steps,
                        duration: 5
                    })
                });

                if(!response.ok) throw new Error(await response.text());

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const endTime = performance.now();
                const totalTime = ((endTime - startTime) / 1000).toFixed(1);

                clearInterval(timerInterval);
                loader.style.display = 'none';

                const isWarm = responseData.data?.warm_start;
                if (isWarm !== undefined) {
                    const warmEl = document.getElementById('metric-warm');
                    if (warmEl) {
                        warmEl.innerHTML = isWarm ? 
                            '<span style="color:#10b981"><i class="fa-solid fa-fire"></i> Warm (Instant)</span>' : 
                            '<span style="color:#f59e0b"><i class="fa-solid fa-snowflake"></i> Cold (Boot)</span>';
                    }
                }

                if(isVideo) {
                    videoPlayer.src = url;
                    videoPlayer.style.display = 'block';
                    setTimeout(() => videoPlayer.style.opacity = '1', 50);
                    videoPlayer.play();
                } else {
                    imagePlayer.src = url;
                    imagePlayer.style.display = 'block';
                    setTimeout(() => imagePlayer.style.opacity = '1', 50);
                }

                document.getElementById('metric-time').textContent = totalTime + 's';
                document.getElementById('metric-model').textContent = model;
                document.getElementById('metric-steps').textContent = steps;
                metrics.style.opacity = '1';

            } catch (err) {
                clearInterval(timerInterval);
                loader.style.display = 'none';
                placeholder.style.display = 'flex';
                alert('Erro na geração: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> Renderizar';
            }
        });
    </script>
</body>
</html>
