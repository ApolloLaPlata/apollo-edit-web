<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo - Estúdio de Dublagem & Clonagem de Voz</title>
    <link rel="stylesheet" href="global_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="laplata_db.js"></script>
    <script src="laplata_settings.js"></script>
    
    <style>
        :root {
            --bg-base: #0f172a;
            --brand-primary: #8b5cf6;
            --brand-secondary: #c084fc;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --paper-bg: #1e293b;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top left, #1e1b4b, var(--bg-base));
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .apollo-topbar-pro {
            height: 60px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 100;
        }
        .topbar-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 600; transition: color 0.2s; }
        .back-btn:hover { color: var(--brand-secondary); }
        .topbar-left h1 { margin: 0; font-size: 18px; font-weight: 900; background: linear-gradient(to right, #3b82f6, #8b5cf6); -webkit-background-clip: text; color: transparent; }

        .editor-container { 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            padding: 40px; 
            flex: 1;
        }

        .panel {
            background: var(--paper-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-box {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            padding: 15px;
            font-family: 'Inter';
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .btn-pro {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }
        .btn-pro:hover { transform: scale(1.02); }

        .voice-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .voice-card {
            flex: 1;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }
        .voice-card.active {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
    </style>

<!-- APOLLO OS IFRAME CSS CLEANUP -->
<script>
    if (window.self !== window.top) {
        document.write('<style> body > header, .apollo-header, .topbar { display: none !important; } </style>');
    }
</script>

</head>
<body>
    
    <header class="apollo-topbar-pro">
        <div class="topbar-left">
            <a href="hub.html" class="back-btn">← Voltar ao Hub</a>
            <h1>🎙️ Estúdio de Dublagem & Voz (RVC)</h1>
        </div>
        <div class="topbar-right">
            <div class="credits-badge" style="display: flex; align-items: center; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 12px; border: 1px solid #331f4e;">
                <span class="gas-icon" style="font-size: 1.2rem; margin-right: 5px;">⛽</span>
                <strong id="user-credits" style="color: #ec4899; font-size: 14px;">...</strong>&nbsp;<span style="color: #94a3b8; font-size: 0.9rem; font-weight: bold;">Gasolina</span>
            </div>
        </div>
    </header>

    <main class="editor-container">
        <div class="panel">
            <h3 style="margin-top: 0;">1. Selecione o Modelo de Voz (RVC)</h3>
            <div class="voice-selector">
                <div class="voice-card active">Locutor Épico</div>
                <div class="voice-card">Documentário</div>
                <div class="voice-card" style="border-style: dashed;">+ Clonar Voz Nova</div>
            </div>

            <h3 style="margin-top: 30px;">2. Texto do Roteiro</h3>
            <textarea class="input-box" rows="6" placeholder="Cole o texto que será narrado pela IA..."></textarea>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span style="font-size: 12px; color: var(--text-muted);">Custo estimado: 40 Créditos</span>
            </div>

            <button class="btn-pro" onclick="generateVoice()">Sintetizar Dublagem</button>
        </div>
    </main>

    <script>
        function generateVoice() {
            if (window.showToast) window.showToast("Iniciando cluster de inferência RVC... (Simulação)", "#3b82f6");
            setTimeout(() => {
                if (window.apolloTransferOS) { window.apolloTransferOS.addItem("audio", "dublagem_rvc.wav", "Estudio RVC", null, { url: "/dummy_voice.m4a" }); }

                if (window.showToast) window.showToast("Áudio .wav gerado e enviado ao Bagageiro!", "#00ffcc");
            }, 3500);
        }
    </script>

        <!-- Supabase SDK e Autenticao -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="apollo_sfx.js"></script>
    <script src="apollo_notifications.js"></script>
    <script src="transfer_hud.js?v=11"></script>
    <script src="copilot_hud.js"></script>
    <script src="apollo_assistant.js"></script>
</body>
</html>
