{% extends "base.html" %}
{% block content %}
<div style="padding-bottom:10px; border-bottom:1px solid var(--border-color); margin-bottom:15px;">
    <h2 style="color:var(--accent);">📝 Gerador de Legendas</h2>
</div>
<div style="display:flex; gap:20px;">
    <!-- LEFT: Arquivos -->
    <div style="flex:2; display:flex; flex-direction:column; gap:15px;">
        <div class="group-box">
            <div class="group-title">📁 Arquivos</div>
            <div class="row"><label style="width:220px;">Vídeo/Áudio de entrada:</label>
                <input type="text" id="leg_video" class="flex-1" readonly placeholder="Selecione o vídeo ou áudio...">
                <button class="btn primary" onclick="browseFile('leg_video','all')">Selecionar...</button></div>
            <div class="row"><label style="width:220px;">Legenda SRT (Opcional se Auto):</label>
                <input type="text" id="leg_srt" class="flex-1" readonly placeholder="Opcional: SRT já existente...">
                <button class="btn outline" onclick="browseFile('leg_srt','all')">Selecionar...</button></div>
            <div class="row"><label style="width:220px;">Arquivo de saída (.mp4):</label>
                <input type="text" id="leg_saida" class="flex-1" readonly placeholder="Onde salvar o vídeo legendado...">
                <button class="btn outline" onclick="browseFile('leg_saida','all')">Salvar como...</button></div>
        </div>

        <div class="group-box">
            <div class="group-title">🎤 Transcrição (Engine)</div>
            <label style="display:block; margin-bottom:10px;"><input type="checkbox" id="auto_transcribe" checked> Gerar SRT automaticamente (se não fornecido)</label>
            <div class="row">
                <label>Engine:</label>
                <label><input type="radio" name="leg_engine" value="vosk" checked> Vosk (Offline / Rápido)</label>
                <label><input type="radio" name="leg_engine" value="whisper"> OpenAI Whisper (Mais preciso / Lento)</label>
            </div>
            <div class="row" style="margin-top:10px;">
                <label style="width:200px;">Modelo Vosk (pasta):</label>
                <input type="text" id="leg_vosk_model" class="flex-1" value="E:/MEUS PROGRAMAS/HISTORIAS DE 7 DIAS CODIGOS/pre_edicao/vosk-model-pt-fb-v0.1.1-20220516_2113" readonly>
                <button class="btn outline" onclick="browseDir('leg_vosk_model')">Selecionar...</button>
            </div>
        </div>

        <div class="group-box">
            <div class="group-title">🎨 Estilo e Posicionamento</div>
            <div class="row">
                <label style="width:80px;">Preset:</label>
                <select id="leg_preset" style="flex:1;">
                    <option>Horizontal 16:9</option>
                    <option>Vertical 9:16</option>
                </select>
                <button class="btn outline" onclick="aplicarPreset()">Aplicar Preset</button>
            </div>
            <div class="row" style="margin-top:8px;">
                <label style="width:80px;">Fonte:</label>
                <input type="text" id="leg_font" value="Bangers Regular" style="width:160px;">
                <label style="margin-left:15px;">Tamanho:</label>
                <input type="number" id="leg_size" value="32" style="width:60px;">
            </div>
            <div class="row" style="margin-top:8px;">
                <label style="width:80px;">Cor Texto:</label>
                <input type="text" id="leg_cor_texto" value="#fbdd65" style="width:90px;">
                <input type="color" value="#fbdd65" oninput="document.getElementById('leg_cor_texto').value=this.value" style="width:30px; padding:0; border:none;">
                <label style="margin-left:15px;">Cor Contorno:</label>
                <input type="text" id="leg_cor_borda" value="#000000" style="width:90px;">
                <input type="color" value="#000000" oninput="document.getElementById('leg_cor_borda').value=this.value" style="width:30px; padding:0; border:none;">
            </div>
            <div class="row" style="margin-top:8px;">
                <label style="width:100px;">Contorno (px):</label>
                <input type="number" value="2" style="width:50px;">
                <label style="margin-left:15px;">Sombra (px):</label>
                <input type="number" value="1" style="width:50px;">
            </div>
            <div class="row" style="margin-top:8px;">
                <label style="width:100px;">Alinhamento:</label>
                <select style="width:160px;">
                    <option>Bottom-Center</option>
                    <option>Bottom-Left</option>
                    <option>Bottom-Right</option>
                    <option>Top-Center</option>
                    <option>Middle-Center</option>
                </select>
                <label style="margin-left:15px;">Margem V:</label>
                <input type="number" id="leg_mv" value="5" style="width:55px;">
                <label style="margin-left:10px;">Esq:</label>
                <input type="number" id="leg_ml" value="100" style="width:55px;">
                <label style="margin-left:10px;">Dir:</label>
                <input type="number" id="leg_mr" value="20" style="width:55px;">
            </div>
            <div class="row" style="margin-top:12px;">
                <button class="btn outline" onclick="">Salvar Configuração</button>
                <button class="btn outline" onclick="">Carregar Configuração</button>
                <button class="btn outline" style="margin-left:auto;" onclick="">Detectar Resolução</button>
            </div>
        </div>

        <button class="btn primary pulse-animation" style="padding:15px; font-size:18px;" onclick="gerarLegenda()">
            📝 GERAR VÍDEO LEGENDADO
        </button>
        <div id="leg-status" style="color:#888; font-size:12px; text-align:center; padding:6px; background:#111; border-radius:4px;">Pronto</div>
    </div>
</div>

<script>
async function browseFile(id, type) {
    const r = await fetch(`/api/browse_file?type=${type}`);
    const d = await r.json();
    if (d.path) document.getElementById(id).value = d.path;
}
async function browseDir(id) {
    const r = await fetch('/api/browse_dir');
    const d = await r.json();
    if (d.path) document.getElementById(id).value = d.path;
}
function aplicarPreset() {
    const preset = document.getElementById('leg_preset').value;
    if (preset === 'Horizontal 16:9') {
        document.getElementById('leg_size').value = 32;
        document.getElementById('leg_mv').value = 5;
        document.getElementById('leg_ml').value = 100;
    } else {
        document.getElementById('leg_size').value = 17;
        document.getElementById('leg_mv').value = 120;
        document.getElementById('leg_ml').value = 20;
    }
}
function gerarLegenda() {
    if (!document.getElementById('leg_video').value) { alert('⚠️ Selecione um vídeo!'); return; }
    document.getElementById('leg-status').textContent = 'Status: Gerando legendas... Aguarde.';
    document.getElementById('leg-status').style.color = '#f59e0b';
}
</script>
{% endblock %}
