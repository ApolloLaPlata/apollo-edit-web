﻿<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Notícias — Analytics — Apollo Studio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global_style.css">
    <link rel="stylesheet" href="noticias.css">
    <style>
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: 0.2s;
        }
        .stat-card:hover { border-color: #555; transform: translateY(-2px); }
        .stat-card .accent-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
        }
        .stat-card .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .stat-card .stat-value {
            font-family: 'Bangers', cursive;
            font-size: 2.8rem;
            letter-spacing: 2px;
            color: #fff;
        }
        .stat-card .stat-label {
            color: #94a3b8;
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 700;
            margin-top: 4px;
        }
        .stat-card .stat-trend {
            font-size: 12px;
            margin-top: 8px;
            font-weight: 700;
        }
        .stat-card .stat-trend.up { color: #2ECC71; }
        .stat-card .stat-trend.down { color: #E74C3C; }
        .social-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: 0.2s;
        }
        .social-row:hover { border-color: #555; }
        .social-row .social-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            flex-shrink: 0;
        }
        .social-row .social-name {
            font-weight: 700;
            color: #fff;
            font-size: 15px;
            min-width: 100px;
        }
        .social-row .social-metrics {
            display: flex;
            gap: 24px;
            flex: 1;
            flex-wrap: wrap;
        }
        .social-row .metric {
            text-align: center;
        }
        .social-row .metric-value {
            font-weight: 800;
            color: #fff;
            font-size: 16px;
        }
        .social-row .metric-label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
        }
        .demo-banner {
            background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(59,130,246,0.15));
            border: 1px dashed #8b5cf6;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #a78bfa;
            font-size: 14px;
            font-family: 'Nunito', sans-serif;
        }
    </style>
<script src="laplata_ai.js"></script>

<!-- APOLLO OS IFRAME CSS CLEANUP -->
<script>
    if (window.self !== window.top) {
        document.write('<style> body > header, .apollo-header, .topbar { display: none !important; } </style>');
    }
</script>

</head>
<body>
    <div id="global-3d-bg"></div>

    <header class="top-nav" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: rgba(30, 30, 30, 0.9); border-bottom: 1px solid #333; backdrop-filter: blur(10px);">
        <div style="display: flex; align-items: center; gap: 20px;">
            <a href="hub.html" style="text-decoration: none;"><div class="main-logo"><span>APOLLO</span> EDIT</div></a>
            <span style="background: rgba(232,67,147,.2); color: #E84393; padding: 4px 12px; border-radius: 6px; font-weight: bold; font-family: 'Nunito', sans-serif;">📊 Analytics</span>
        </div>
        <h2 id="tool-title" style="color: #fff; margin:0; font-family: 'Bangers', cursive; letter-spacing: 2px; font-size: 1.8rem;"></h2>
        <div class="credits-badge" style="display: flex; align-items: center; gap: 8px;">
            <span class="gas-icon"></span>
            <strong id="user-credits">...</strong>&nbsp;Gasolina
        </div>
    </header>

    <div class="tool-container">
        <div id="noticias-nav" style="display:flex; gap:8px; overflow-x:auto; padding-bottom:15px; margin-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.1); flex-wrap: wrap;"></div>

        <div class="ad-slot" style="margin: 0 auto 20px auto; max-width: 728px;">
            <span>[ESPAÇO PUBLICITÁRIO - 728x90]</span>
        </div>

        <!-- ====== CONTEÚDO: ANALYTICS ====== -->
        <div class="demo-banner">
            <i class="fas fa-flask fa-lg"></i>
            <span><strong>MODO DEMO</strong> — Os dados abaixo são ilustrativos. Conecte suas redes sociais nas Configurações para ver dados reais.</span>
        </div>

        <div id="analytics-container"></div>

        <div class="ad-slot" style="margin: 20px auto 0 auto; max-width: 728px;">
            <span>[ESPAÇO PUBLICITÁRIO - 728x90]</span>
        </div>
    </div>

    <div id="toast-container" style="position:fixed; top:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:10px;"></div>

    <script src="noticias_nav.js"></script>
    <script src="analytics_logic.js"></script>
    <script src="bg_parallax.js"></script>
    <script src="i18n_loader.js"></script>
    <script src="apollo_quests.js"></script>
    <script src="apollo_tour.js"></script>
<script src="laplata_inventory.js"></script>
<script src="copilot_knowledge_base.js"></script>
<script src="apollo_copilot.js"></script>
<script src="apollo_quests.js"></script>

    <!-- APOLLO OS CORE (Auto-Injected) -->
    <script src="laplata_db.js"></script>
    <script src="laplata_settings.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="apollo_sfx.js"></script>
    <script src="apollo_notifications.js"></script>
    <script src="transfer_hud.js?v=11"></script>
    <script src="copilot_hud.js"></script>
    <script src="apollo_assistant.js"></script>
</body>
</html>
