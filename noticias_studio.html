﻿<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Notícias — Estúdio — Apollo Studio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global_style.css">
    <link rel="stylesheet" href="noticias.css">
    <style>
        /* ── Studio page-specific styles ── */
        .apollo-toast { padding: 12px 20px; border-radius: 8px; color: #fff; font-weight: 600; font-family: 'Nunito', sans-serif; transition: opacity 0.3s; }
        .apollo-toast.success { background: #2ECC71; }
        .apollo-toast.error   { background: #E74C3C; }
        .apollo-toast.info    { background: #3498DB; }

        .studio-canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto 24px auto;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #333;
            background: #0d1117;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #studio-canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: grab;
        }
        #studio-canvas:active { cursor: grabbing; }

        .studio-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 16px;
        }
        .studio-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .studio-field label {
            color: #94a3b8;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .studio-field input[type="text"] {
            padding: 10px 14px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            min-width: 240px;
            transition: border-color 0.2s;
        }
        .studio-field input[type="text"]:focus {
            outline: none;
            border-color: #1ABC9C;
        }
        .studio-field input[type="color"] {
            width: 44px;
            height: 44px;
            border: 2px solid #444;
            border-radius: 8px;
            cursor: pointer;
            background: none;
            padding: 2px;
        }
        .studio-field input[type="range"] {
            width: 140px;
            accent-color: #1ABC9C;
            height: 6px;
        }
        .studio-size-display {
            color: #1ABC9C;
            font-family: 'Bangers', cursive;
            font-size: 1.1rem;
            min-width: 40px;
            text-align: center;
        }

        .studio-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .studio-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .studio-btn.green   { background: #2ECC71; color: #000; }
        .studio-btn.green:hover { background: #27ae60; }
        .studio-btn.red     { background: #E74C3C; color: #fff; }
        .studio-btn.red:hover   { background: #c0392b; }
        .studio-btn.blue    { background: #3498DB; color: #fff; }
        .studio-btn.blue:hover  { background: #2980b9; }
        .studio-btn.teal    { background: #1ABC9C; color: #000; }
        .studio-btn.teal:hover  { background: #16a085; }

        .studio-upload-label {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            color: #cbd5e1;
            border: 1px dashed #555;
            border-radius: 8px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .studio-upload-label:hover { background: rgba(255,255,255,0.15); border-color: #888; }

        .noticias-nav-pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 20px;
            font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.85rem;
            text-decoration: none; border: 2px solid; transition: all 0.2s;
            white-space: nowrap;
        }
        .noticias-nav-pill:hover { filter: brightness(1.2); transform: translateY(-1px); }
    </style>
<script src="laplata_ai.js"></script>

<!-- APOLLO OS IFRAME CSS CLEANUP -->
<script>
    if (window.self !== window.top) {
        document.write('<style> body > header, .apollo-header, .topbar { display: none !important; } </style>');
    }
</script>

</head>
<body>
    <div id="global-3d-bg"></div>

    <header class="top-nav" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: rgba(30, 30, 30, 0.9); border-bottom: 1px solid #333; backdrop-filter: blur(10px);">
        <div style="display: flex; align-items: center; gap: 20px;">
            <a href="hub.html" style="text-decoration: none;"><div class="main-logo"><span>APOLLO</span> EDIT</div></a>
            <span style="background: rgba(124,58,237,.2); color: #9B59B6; padding: 4px 12px; border-radius: 6px; font-weight: bold; font-family: 'Nunito', sans-serif;">📰 Central de Notícias</span>
        </div>
        <h2 id="tool-title" style="color: #fff; margin:0; font-family: 'Bangers', cursive; letter-spacing: 2px; font-size: 1.8rem;"></h2>
        <div class="credits-badge" style="display: flex; align-items: center; gap: 8px;">
            <span class="gas-icon"></span>
            <strong id="user-credits">...</strong> Gasolina
        </div>
    </header>

    <div class="tool-container">
        <!-- Navigation Pills -->
        <div id="noticias-nav" style="display:flex; gap:8px; overflow-x:auto; padding-bottom:15px; margin-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.1); flex-wrap: wrap;"></div>

        <div class="ad-slot" style="margin: 0 auto 20px auto; max-width: 728px;">
            <span>[ESPAÇO PUBLICITÁRIO - 728x90]</span>
        </div>

        <!-- ═══════════════ STUDIO CONTENT ═══════════════ -->
        <div class="news-card">
            <h2 style="margin:0 0 6px 0; font-family:'Bangers',cursive; font-size:1.6rem; letter-spacing:1px; color:#1ABC9C;">
                <i class="fas fa-paint-brush"></i> Estúdio de Capas
            </h2>
            <p style="margin:0 0 20px 0; color:#94a3b8; font-family:'Nunito',sans-serif; font-size:0.9rem;">
                Crie thumbnails para YouTube — carregue uma imagem de fundo, adicione textos e baixe o resultado.
            </p>

            <!-- Canvas -->
            <div class="studio-canvas-wrapper">
                <canvas id="studio-canvas" width="1280" height="720"></canvas>
            </div>

            <!-- Controls -->
            <div class="studio-controls">
                <div class="studio-field" style="flex:1; min-width:200px;">
                    <label for="studio-text"><i class="fas fa-font"></i> Texto</label>
                    <input id="studio-text" type="text" placeholder="Digite o texto da thumbnail…" />
                </div>

                <div class="studio-field">
                    <label for="studio-color"><i class="fas fa-palette"></i> Cor</label>
                    <input id="studio-color" type="color" value="#FFFFFF" />
                </div>

                <div class="studio-field">
                    <label><i class="fas fa-text-height"></i> Tamanho</label>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <input id="studio-size" type="range" min="20" max="200" value="100" oninput="document.getElementById('size-display').textContent=this.value+'px'" />
                        <span id="size-display" class="studio-size-display">100px</span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="studio-actions">
                <button class="studio-btn green" onclick="addTextToStudio()">
                    <i class="fas fa-plus"></i> Adicionar Texto
                </button>
                <button class="studio-btn red" onclick="clearStudioTexts()">
                    <i class="fas fa-eraser"></i> Limpar Textos
                </button>
                <button class="studio-btn blue" onclick="downloadStudioImage()">
                    <i class="fas fa-download"></i> Baixar Imagem
                </button>
                <label class="studio-upload-label">
                    <i class="fas fa-image"></i> Carregar Fundo
                    <input id="studio-load-image" type="file" accept="image/*" onchange="loadStudioImage(event)" style="display:none;" />
                </label>
            </div>
        </div>

        <div class="ad-slot" style="margin: 20px auto 0 auto; max-width: 728px;">
            <span>[ESPAÇO PUBLICITÁRIO - 728x90]</span>
        </div>
    </div>

    <div id="toast-container" style="position:fixed; top:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:10px;"></div>

    <script src="noticias_nav.js"></script>
    <script src="studio_logic.js"></script>
    <script src="bg_parallax.js"></script>
    <script src="i18n_loader.js"></script>
    <script src="apollo_quests.js"></script>
    <script src="apollo_tour.js"></script>
<script src="laplata_inventory.js"></script>
<script src="copilot_knowledge_base.js"></script>
<script src="apollo_copilot.js"></script>
<script src="apollo_quests.js"></script>

    <!-- APOLLO OS CORE (Auto-Injected) -->
    <script src="laplata_db.js"></script>
    <script src="laplata_settings.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="apollo_sfx.js"></script>
    <script src="apollo_notifications.js"></script>
    <script src="transfer_hud.js?v=11"></script>
    <script src="copilot_hud.js"></script>
    <script src="apollo_assistant.js"></script>
</body>
</html>
