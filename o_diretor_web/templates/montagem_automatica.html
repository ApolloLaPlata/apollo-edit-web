{% extends "base.html" %}
{% block content %}
<div style="padding-bottom:10px; border-bottom:1px solid var(--border-color); margin-bottom:15px;">
    <h2 style="color:var(--accent);">🤖 Montagem Automática — Sistema de Roteiro</h2>
</div>
<div style="display:flex; gap:20px;">
    <!-- LEFT: Configurações -->
    <div class="group-box" style="flex:1; display:flex; flex-direction:column; gap:15px;">
        <div class="group-title">📋 Configurações do Roteiro</div>

        <div>
            <label style="font-size:12px; color:#aaa;">📄 Arquivo de Roteiro (.txt / .json):</label>
            <div class="row" style="margin-top:6px;">
                <button class="btn primary" onclick="browseFile('ma_roteiro_path','all')">📂 Selecionar Roteiro</button>
                <input type="text" id="ma_roteiro_path" class="flex-1" readonly placeholder="Nenhum arquivo selecionado">
            </div>
        </div>

        <div>
            <label style="font-size:12px; color:#aaa;">📁 Pasta de Vídeos:</label>
            <div class="row" style="margin-top:6px;">
                <button class="btn primary" onclick="browseDir('ma_videos_path')">📂 Selecionar Pasta</button>
                <input type="text" id="ma_videos_path" class="flex-1" readonly placeholder="Nenhuma pasta selecionada">
            </div>
        </div>

        <div>
            <label style="font-size:12px; color:#aaa;">📐 Formato de Saída:</label>
            <div class="row" style="margin-top:6px;">
                <label><input type="radio" name="ma_formato" value="horizontal"> Horizontal</label>
                <label><input type="radio" name="ma_formato" value="vertical"> Vertical</label>
                <label><input type="radio" name="ma_formato" value="ambos" checked> Ambos</label>
            </div>
        </div>

        <button class="btn primary" style="padding:12px; font-size:16px; margin-top:20px;" onclick="processarRoteiro()">
            🚀 Processar Roteiro
        </button>

        <div id="ma-status" style="color:#888; font-size:12px; text-align:center;">
            Status: Aguardando roteiro...
        </div>
    </div>

    <!-- RIGHT: Visualização -->
    <div class="group-box" style="flex:2; display:flex; flex-direction:column;">
        <div class="group-title">👁️ Visualização do Roteiro</div>
        <textarea id="ma_texto_roteiro" style="flex:1; min-height:450px; font-size:13px; color:#0f0; font-family:Consolas,monospace;"
            placeholder="O conteúdo do roteiro aparecerá aqui após selecionar o arquivo..."></textarea>
    </div>
</div>

<script>
async function browseFile(inputId, fileType) {
    const r = await fetch(`/api/browse_file?type=${fileType}`);
    const d = await r.json();
    if (d.path) {
        document.getElementById(inputId).value = d.path;
        if (inputId === 'ma_roteiro_path') {
            const resp = await fetch('/api/read_file?path=' + encodeURIComponent(d.path));
            if (resp.ok) { const t = await resp.text(); document.getElementById('ma_texto_roteiro').value = t; }
        }
    }
}
async function browseDir(inputId) {
    const r = await fetch('/api/browse_dir');
    const d = await r.json();
    if (d.path) document.getElementById(inputId).value = d.path;
}
function processarRoteiro() {
    const p = document.getElementById('ma_roteiro_path').value;
    if (!p) { alert('⚠️ Selecione um arquivo de roteiro!'); return; }
    document.getElementById('ma-status').textContent = 'Status: Processando roteiro...';
    document.getElementById('ma-status').style.color = '#f59e0b';
    setTimeout(() => {
        document.getElementById('ma-status').textContent = 'Status: Roteiro enviado para processamento ✅';
        document.getElementById('ma-status').style.color = '#22c55e';
    }, 800);
}
</script>
{% endblock %}
