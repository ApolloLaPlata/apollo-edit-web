{% extends "base.html" %}
{% block content %}
<div style="padding-bottom:10px; border-bottom:1px solid var(--border-color); margin-bottom:15px;">
    <h2 style="color:var(--accent);">🎞️ Dublagem Externa (RVC)</h2>
    <p style="color:#888; font-size:13px; margin-top:5px;">Inferência de Vídeo com modelos de voz RVC</p>
</div>
<div style="display:flex; gap:20px;">
    <!-- LEFT: Configurações -->
    <div class="group-box" style="flex:1; display:flex; flex-direction:column; gap:15px;">
        <div class="group-title">🎭 Configurações RVC</div>

        <div>
            <label style="font-size:12px; color:#aaa;">👤 Personagem / Modelo:</label>
            <select id="rvc_personagem" style="width:100%; margin-top:6px;">
                <option>Rafael Descargas</option>
                <option>Mona Cansada</option>
            </select>
        </div>

        <div>
            <label style="font-size:12px; color:#aaa;">🎵 Arquivo de Áudio de Entrada:</label>
            <div class="row" style="margin-top:6px;">
                <input type="text" id="rvc_audio_in" class="flex-1" readonly placeholder="Selecione o áudio...">
                <button class="btn primary" onclick="browseFile('rvc_audio_in','audio')">📁</button>
            </div>
        </div>

        <div>
            <label style="font-size:12px; color:#aaa;">🔊 Pitch (semitons):</label>
            <div class="row" style="margin-top:6px;">
                <input type="range" id="rvc_pitch" min="-12" max="12" value="0" style="flex:1;" oninput="document.getElementById('rvc_pitch_lbl').textContent=this.value">
                <span id="rvc_pitch_lbl" style="width:30px; text-align:right;">0</span>
            </div>
        </div>

        <div>
            <label style="font-size:12px; color:#aaa;">🎯 Índice de Feature (0-1):</label>
            <div class="row" style="margin-top:6px;">
                <input type="range" id="rvc_index" min="0" max="100" value="75" style="flex:1;" oninput="document.getElementById('rvc_idx_lbl').textContent=(this.value/100).toFixed(2)">
                <span id="rvc_idx_lbl" style="width:35px; text-align:right;">0.75</span>
            </div>
        </div>

        <div>
            <label style="font-size:12px; color:#aaa;">⚙️ Método de Extração de F0:</label>
            <select style="width:100%; margin-top:6px;">
                <option>rmvpe</option>
                <option>pm</option>
                <option>harvest</option>
                <option>crepe</option>
            </select>
        </div>

        <button class="btn primary" style="padding:12px; font-size:16px; margin-top:auto;" onclick="executarRVC()">
            🎙️ Executar RVC
        </button>
        <div id="rvc-status" style="color:#888; font-size:12px; text-align:center;">
            Status: Aguardando...
        </div>
    </div>

    <!-- RIGHT: Saída e Log -->
    <div class="group-box" style="flex:2; display:flex; flex-direction:column; gap:12px;">
        <div class="group-title">💾 Saída & Log</div>

        <div class="row">
            <label style="width:120px;">Arquivo de Saída:</label>
            <input type="text" id="rvc_audio_out" class="flex-1" readonly placeholder="Caminho do arquivo gerado...">
            <button class="btn outline" onclick="browseFile('rvc_audio_out','audio')">📁</button>
        </div>

        <div>
            <label style="font-size:12px; color:#aaa; display:block; margin-bottom:6px;">📋 Log de Execução:</label>
            <textarea id="rvc-log" style="flex:1; min-height:400px; color:#0f0; font-family:Consolas,monospace; font-size:11px; resize:none;" readonly
                placeholder="Saída do processo RVC aparecerá aqui..."></textarea>
        </div>
    </div>
</div>

<script>
async function browseFile(id, type) {
    const r = await fetch(`/api/browse_file?type=${type}`);
    const d = await r.json();
    if (d.path) document.getElementById(id).value = d.path;
}
function executarRVC() {
    const audio = document.getElementById('rvc_audio_in').value;
    if (!audio) { alert('⚠️ Selecione um arquivo de áudio!'); return; }
    document.getElementById('rvc-status').textContent = 'Status: Processando RVC...';
    document.getElementById('rvc-status').style.color = '#f59e0b';
    document.getElementById('rvc-log').value += '[INFO] Iniciando inferência RVC...\n';
    // TODO: POST /api/executar_rvc
}
</script>
{% endblock %}
