{% extends "base.html" %}

{% block head %}
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='timeline.css') }}">
    <style>
        .main-content {
            padding: 0; 
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }
        /* Oculta a header original do app de timeline para não duplicar com as abas */
        .topbar {
            display: none;
        }
        /* A timeline-container e workspace devem ocupar o restante da tela */
        .workspace {
            flex: 1;
        }
    </style>
{% endblock %}

{% block content %}
<!-- Main Workspace -->
<div class="workspace">
    
    <!-- Left Sidebar: Media Library -->
    <aside class="media-library">
        <div class="panel-header">
            <h3>📁 Biblioteca de Mídia</h3>
            <button class="btn-icon">➕ Importar</button>
        </div>
        <div class="media-grid" id="media-grid">
            <!-- Mídias aparecerão aqui para serem arrastadas -->
            <div class="media-item" draggable="true" data-type="video" data-duration="5.0">
                <div class="media-thumb bg-blue">🎥</div>
                <div class="media-info">video_base.mp4<br><span>00:05.00</span></div>
            </div>
            <div class="media-item" draggable="true" data-type="audio" data-duration="12.0">
                <div class="media-thumb bg-orange">🎵</div>
                <div class="media-info">narracao_1.wav<br><span>00:12.00</span></div>
            </div>
        </div>
    </aside>

    <!-- Center: Video Preview & Inspector -->
    <main class="preview-area">
        <div class="player-container">
            <video id="main-player" controls preload="auto">
                <source src="" type="video/mp4">
                Seu navegador não suporta vídeos.
            </video>
        </div>
        <div class="player-controls">
            <span id="current-time-display">00:00:00:00</span>
            <button id="btn-play" class="btn secondary">▶ Play</button>
            <div class="topbar-actions" style="margin-left: auto;">
                <!-- Botões movidos da topbar antiga -->
                <button id="btn-save-project" class="btn secondary">⬇️ Salvar Projeto</button>
                <button id="btn-load-project" class="btn secondary">⬆️ Abrir Projeto</button>
                <input type="file" id="file-load-project" accept=".json" style="display:none;">
                <button id="btn-export" class="btn primary">💾 Exportar HD</button>
            </div>
        </div>
    </main>
    
    <!-- Right Sidebar: Properties (Inspector) -->
    <aside class="inspector">
        <div class="panel-header">
            <h3>⚙️ Propriedades</h3>
        </div>
        <div class="inspector-content" id="inspector-content">
            <p class="empty-text">Selecione um clipe na timeline.</p>
        </div>
    </aside>

</div>

<!-- Bottom: Timeline Editor -->
<div class="timeline-container">
    
    <!-- Toolbar da Timeline -->
    <div class="timeline-toolbar">
        <div class="tools">
            <button class="tool-btn active" id="tool-btn-select" title="Selecionar (V)" onclick="setActiveTool('select')">🖐️ Seleção</button>
            <button class="tool-btn" id="tool-btn-razor" title="Gilete — Cortar clipe (B)" onclick="setActiveTool('razor')">✂️ Gilete</button>
        </div>
        <div class="zoom-controls">
            <span>🔍 Zoom:</span>
            <input type="range" id="zoom-slider" min="1" max="50" value="10">
        </div>
    </div>

    <!-- Trilhos -->
    <div class="timeline-tracks" id="timeline-tracks">
        <!-- Playhead -->
        <div class="playhead" id="playhead">
            <div class="playhead-head"></div>
            <div class="playhead-line"></div>
        </div>

        <!-- Track 1: Vídeo Principal (V1) — ordem z-index: mais alto = mais visível no render -->
        <div class="track video-track" data-track-id="v1" data-track-type="video" data-z-order="1">
            <div class="track-header">
                <div class="track-label">
                    <span class="track-icon">🎬</span>
                    <span class="track-name">V1</span>
                </div>
                <div class="track-controls">
                    <button class="btn-track-mute btn-icon" title="Silenciar trilha" data-track-id="v1">🔊</button>
                    <button class="btn-track-solo btn-icon" title="Solo (só esta trilha)" data-track-id="v1">S</button>
                    <button class="btn-track-vis btn-icon" title="Ocultar trilha" data-track-id="v1">👁️</button>
                </div>
            </div>
            <div class="track-content" id="track-v1-content"></div>
        </div>

        <!-- Track 2: Áudio Principal (A1) -->
        <div class="track audio-track" data-track-id="a1" data-track-type="audio" data-z-order="1">
            <div class="track-header">
                <div class="track-label">
                    <span class="track-icon">🎵</span>
                    <span class="track-name">A1</span>
                </div>
                <div class="track-controls">
                    <button class="btn-track-mute btn-icon" title="Silenciar trilha" data-track-id="a1">🔊</button>
                    <button class="btn-track-solo btn-icon" title="Solo (só esta trilha)" data-track-id="a1">S</button>
                    <button class="btn-track-vis btn-icon" title="Ocultar trilha" data-track-id="a1">👁️</button>
                </div>
            </div>
            <div class="track-content" id="track-a1-content"></div>
        </div>
    </div>

</div>

<script src="{{ url_for('static', filename='timeline.js') }}"></script>
{% endblock %}
