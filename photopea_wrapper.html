<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo Fotopia Editor</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1e1e1e;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        #photopea-frame {
            width: 100%;
            height: calc(100% - 40px);
            border: none;
        }
        .topbar {
            height: 40px;
            background: #0f172a;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #1e293b;
            justify-content: space-between;
        }
        .title {
            font-size: 14px;
            font-weight: 600;
        }
        .title span {
            color: #38bdf8;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="title">🚀 Apollo <span>Fotopia (IA Powered)</span></div>
        <button class="btn" onclick="exportToBagageiro()">💾 Salvar no Bagageiro</button>
    </div>

    <!-- Inicialização do Photopea via Iframe usando a API oficial deles -->
    <iframe id="photopea-frame" src="https://www.photopea.com" onload="initPhotopea()"></iframe>

    <script>
        let ppFrame = document.getElementById("photopea-frame").contentWindow;
        let loadedImageUrl = null;

        function initPhotopea() {
            // Escuta se a janela pai (Visualizador) mandou alguma imagem para abrir
            window.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'load_image') {
                    loadedImageUrl = e.data.url;
                    
                    // Script que o Photopea entende para abrir arquivo a partir de URL
                    const script = `
                        app.open("${loadedImageUrl}", null, true);
                    `;
                    ppFrame.postMessage(script, "*");
                }
            });
            
            // Avisa o pai que estamos prontos
            if(window.parent) {
                window.parent.postMessage({ type: 'photopea_ready' }, '*');
            }
        }

        function exportToBagageiro() {
            // Pede ao Photopea para salvar e devolver o arquivo final
            // script do photopea para salvar como PNG e devolver ArrayBuffer
            ppFrame.postMessage('app.activeDocument.saveToOE("png");', "*");
        }

        // Recebe o buffer retornado pelo Photopea após o saveToOE
        window.addEventListener("message", function(e) {
            if (e.data instanceof ArrayBuffer) {
                // Aqui receberíamos o arquivo e mandaríamos para o servidor do Apollo
                // Simulando ganho de KM ao exportar também
                if (window.parent) {
                    window.parent.postMessage({ type: 'apollo_export_km', amount: 20 }, '*');
                }
                alert("Imagem processada! (Na versão final, será enviada de volta ao seu Bagageiro).");
            }
        });
    </script>
</body>
</html>
