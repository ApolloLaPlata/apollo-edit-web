<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo Áudio Studio (Simples)</title>
    <style>
        :root {
            --bg-dark: #111;
            --brand-accent: #10b981;
        }
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: var(--bg-dark); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }
        .apollo-header { height: 50px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--brand-accent); }
        .apollo-title { color: #fff; font-weight: bold; margin: 0; font-size: 16px; }
        .btn-bagageiro { background: var(--brand-accent); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-bagageiro:hover { background: #059669; }
    </style>

<!-- APOLLO OS IFRAME CSS CLEANUP -->
<script>
    if (window.self !== window.top) {
        document.write('<style> body > header, .apollo-header, .topbar { display: none !important; } </style>');
    }
</script>

</head>
<body>
    <script src="laplata_db.js"></script>
    <script src="laplata_settings.js"></script>
        <!-- Supabase SDK e Autenticao -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="apollo_sfx.js"></script>
    <script src="apollo_notifications.js"></script>
    <script src="transfer_hud.js?v=11"></script>
    <script src="copilot_hud.js"></script>

    <header class="apollo-header">
        <h3 class="apollo-title">🎧 APOLLO AUDIO STUDIO (SIMPLES)</h3>
        <div>
            <button class="btn-bagageiro" onclick="console.log('Salvar na Garagem acionado')">💾 Salvar (Garagem)</button>
            <a href="hub.html" style="color: #ccc; text-decoration: none; margin-left: 20px; font-size: 14px;">Voltar ao Hub</a>
        </div>
    </header>

    <div id="audiomass-wrapper" style="flex: 1; width: 100%; position: relative; overflow: hidden;">
        <!-- Engine Open Source Local (AudioMass) -->
        <iframe id="audiomass-container" src="engines/audiomass/src/index.html" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;"></iframe>
    </div>

    <!-- Interceptor de Downloads do iFrame -->
    <script>
        document.getElementById('audiomass-container').addEventListener('load', function() {
            try {
                const iframeWin = this.contentWindow;
                
                // Sequestra o clique em links de download gerados via Blob
                const originalClick = iframeWin.HTMLAnchorElement.prototype.click;
                iframeWin.HTMLAnchorElement.prototype.click = function() {
                    if (this.download && this.href && this.href.startsWith('blob:')) {
                        // O iFrame quer baixar um arquivo gerado localmente! Vamos copiar.
                        fetch(this.href).then(r => r.blob()).then(blob => {
                            if (window.apolloTransferOS) {
                                window.apolloTransferOS.receiveFile(blob, this.download || 'audio_exportado.wav');
                            }
                        }).catch(e => console.error("Erro ao sequestrar Blob do AudioMass:", e));
                    }
                    // Mantem o comportamento original
                    return originalClick.apply(this, arguments);
                };

                console.log("Ninja: Interceptador do Bagageiro injetado no AudioMass!");
            } catch(e) {
                console.warn("Falha ao injetar interceptador no AudioMass (CORS ou restricao):", e);
            }
        });
    </script>

    <!-- Bruxelinha AI Assistant -->
    <script src="apollo_assistant.js"></script>
</body>
</html>
