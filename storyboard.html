<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo - Storyboard & Mapa Mental</title>
    <link rel="stylesheet" href="global_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="laplata_db.js"></script>
    <script src="laplata_settings.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            background: #121212;
        }

        .apollo-topbar-pro {
            height: 60px;
            background: #1e1e1e;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .topbar-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { color: #aaa; text-decoration: none; font-size: 14px; font-weight: 600; }
        .back-btn:hover { color: #fff; }
        .topbar-left h1 { margin: 0; font-size: 18px; font-weight: 900; color: #fff; }
        
        .btn-pro {
            background: #8b5cf6;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>

<!-- APOLLO OS IFRAME CSS CLEANUP -->
<script>
    if (window.self !== window.top) {
        document.write('<style> body > header, .apollo-header, .topbar { display: none !important; } </style>');
    }
</script>

</head>
<body>
    
    <header class="apollo-topbar-pro">
        <div class="topbar-left">
            <a href="hub.html" class="back-btn">← Voltar ao Hub</a>
            <h1>🗺️ Mapa Mental (Excalidraw)</h1>
        </div>
        <div class="topbar-right">
            <button class="btn-pro" onclick="alert('Funcionalidade de Salvar para Bagageiro em breve!')">💾 Salvar no Bagageiro</button>
        </div>
    </header>

    <div style="flex: 1; width: 100%;">
        <iframe src="https://excalidraw.com/" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>

        <!-- Supabase SDK e Autenticao -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="apollo_sfx.js"></script>
    <script src="apollo_notifications.js"></script>
    <script src="transfer_hud.js?v=11"></script>
    <script src="copilot_hud.js"></script>
    <script src="apollo_assistant.js"></script>
</body>
</html>
