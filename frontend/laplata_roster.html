﻿<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="global_style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo Roster - Personagens</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Bangers&family=Nunito:wght@400;800&display=swap" rel="stylesheet">
    <style>
        /* Estilos Locais do Roster */
        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .character-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .character-card:hover {
            transform: translateY(-5px);
            border-color: #2ECC71;
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.3);
        }

        .character-img-wrapper {
            width: 100%;
            aspect-ratio: 1/1;
            background: #0f172a;
            position: relative;
            overflow: hidden;
        }

        .character-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .character-card-content {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .character-tag {
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            color: #2ECC71;
            margin: 0;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 #000;
        }

        .character-category {
            font-size: 0.8rem;
            color: #94a3b8;
            background: #0f172a;
            padding: 2px 8px;
            border-radius: 12px;
            align-self: flex-start;
            border: 1px solid #334155;
        }

        .btn-add-char {
            background: rgba(46, 204, 113, 0.1);
            border: 2px dashed #2ECC71;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1/1;
            color: #2ECC71;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add-char:hover {
            background: rgba(46, 204, 113, 0.2);
            transform: scale(1.02);
        }

        .btn-add-char i {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.8); 
            z-index: 10000; 
            justify-content: center; 
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #1e293b; 
            padding: 30px; 
            border-radius: 16px; 
            width: 500px; 
            max-width: 90%; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.7); 
            border: 1px solid #334155;
            position: relative;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #cbd5e1;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: #2ECC71;
            box-shadow: 0 0 0 2px rgba(46, 204, 113, 0.2);
        }

        .image-dropzone {
            width: 100%;
            height: 150px;
            border: 2px dashed #475569;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(15, 23, 42, 0.5);
            margin-top: 10px;
        }

        .image-dropzone:hover {
            border-color: #2ECC71;
            color: #2ECC71;
            background: rgba(46, 204, 113, 0.05);
        }

        .image-preview-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .preview-thumb {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid #475569;
        }
    </style>
<script src="laplata_ai.js"></script>

<!-- APOLLO OS IFRAME CSS CLEANUP -->
<script>
    if (window.self !== window.top) {
        document.write('<style> body > header, .apollo-header, .topbar { display: none !important; } </style>');
    }
</script>

</head>
<body>
    <div id="global-3d-bg"></div>
    
    <!-- Topbar -->
    <header style="padding: 10px 20px;">
        <div class="top-nav" style="flex-grow: 1; display: flex; align-items: center; justify-content: flex-start; gap: 20px;">
            <a href="hub.html" style="text-decoration: none;">
                <div class="main-logo"><span>APOLLO</span> EDIT WEB</div>
            </a>
            <span class="badge" style="background: rgba(46, 204, 113, 0.2); color: #2ECC71; padding: 4px 8px; border-radius: 4px;">La Plata V2</span>
            <div class="credits-badge" style="margin-left: 20px; display: flex; align-items: center;">
                <span class="gas-icon"></span>
                <strong id="user-credits">...</strong>&nbsp;<span>Gasolina</span>
            </div>
        </div>

        <div class="user-widget" id="user-widget" style="display: flex; gap: 10px; align-items: center; margin-left: auto;">
            <div class="user-info" style="text-align: right; display: flex; flex-direction: column;">
                <span class="user-name" id="user-name" style="font-size: 14px; font-weight: bold; color: #fff;">Usuário</span>
            </div>
            <div class="avatar" style="width: 40px; height: 40px; border-radius: 50%; background: #333; border: 2px solid #FFD32A;"></div>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="workspace" style="flex-direction: column; align-items: center; padding: 20px; overflow-y: auto;">

        <!-- Header -->
        <div style="width: 100%; max-width: 1200px; margin-bottom: 30px; display: flex; align-items: center; gap: 20px; background: linear-gradient(145deg, #112a1d 0%, #0d1a14 100%); padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #2ECC71; position: relative; overflow: hidden;">
            <div style="position:absolute; top:-30px; right:-20px; font-size: 150px; opacity: 0.05; transform: rotate(15deg); pointer-events: none;">🎭</div>
            
            <div style="font-size: 3.5rem; background: #2ECC71; border-radius: 50%; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; border: var(--border-thick); box-shadow: 0 8px 0 var(--border-dark); z-index: 2;">🎭</div>
            <div style="z-index: 2; flex-grow: 1;">
                <h3 style="font-family: 'Bangers', cursive; font-size: 3.5rem; color: #fff; text-shadow: 4px 4px 0 #000; margin: 0; letter-spacing: 3px;">
                    PERSONAGENS
                </h3>
                <p style="font-family: 'Nunito', sans-serif; font-size: 1.4rem; color: #cbd5e1; margin: 0; font-weight: 800; text-shadow: 1px 1px 0 #000;">
                    Gerencie o elenco (atores, objetos, estilos) para manter consistência com o Gemini.
                </p>
            </div>
            
            <div style="z-index: 2;">
                <button class="btn primary" id="btn-open-modal" style="background: #2ECC71; border-color: #27ae60; color: #000; font-weight: 800; font-size: 1.2rem; padding: 15px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(46,204,113,0.4);">
                    + Novo Personagem
                </button>
            </div>
        </div>

        <!-- Toolbar (Filters/Search) -->
        <div style="width: 100%; max-width: 1200px; display: flex; gap: 15px; margin-bottom: 20px; padding: 0 20px;">
            <input type="text" id="search-input" class="form-input" placeholder="🔍 Buscar por #Tag ou Nome..." style="flex-grow: 1; max-width: 400px; background: rgba(15,23,42,0.8);">
            <select id="category-filter" class="form-input" style="width: 200px; background: rgba(15,23,42,0.8);">
                <option value="all">Todas Categorias</option>
                <!-- Preenchido via JS -->
            </select>
        </div>

        <!-- Grid de Personagens -->
        <div class="roster-grid" id="roster-grid">
            <!-- Loading skeleton ou cards serão injetados aqui via JS -->
            <div style="color: #94a3b8; text-align: center; grid-column: 1/-1; padding: 40px;">
                Carregando banco de dados local...
            </div>
        </div>

    </div>

    <!-- Modal de Criação/Edição -->
    <div id="character-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="btn-close-modal" style="position: absolute; top: 15px; right: 20px; background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer;">&times;</button>
            
            <h2 id="modal-title" style="margin-top:0; color:#2ECC71; font-size:1.5rem; font-family: 'Bangers', cursive; letter-spacing: 1px;">Adicionar Personagem</h2>
            
            <input type="hidden" id="char-id">
            
            <div class="form-group">
                <label>Tag do Personagem (ex: #Heroi, HomemAranha)</label>
                <input type="text" id="char-name" class="form-input" placeholder="Tag única">
            </div>

            <div class="form-group">
                <label>Categoria (ex: Atores Principais, Objetos)</label>
                <input type="text" id="char-category" class="form-input" placeholder="Categoria">
            </div>

            <div class="form-group">
                <label>Descrição Opcional (Traços Físicos)</label>
                <textarea id="char-description" class="form-input" rows="3" placeholder="Alto, cabelos escuros, jaqueta vermelha..."></textarea>
            </div>

            <div class="form-group">
                <label>Imagens de Referência</label>
                <div class="image-dropzone" id="image-dropzone">
                    <span style="font-size: 2rem; margin-bottom: 5px;">🖼️</span>
                    <span>Clique ou Arraste imagens aqui</span>
                </div>
                <input type="file" id="image-input" multiple accept="image/*" style="display: none;">
                <div class="image-preview-container" id="image-preview-container">
                    <!-- Previews injetados aqui -->
                </div>
            </div>

            <div style="display:flex; gap:10px; justify-content:space-between; margin-top:25px;">
                <button class="btn" id="btn-delete-char" style="background:#ef4444; border-color:#dc2626; color:white; display: none;">Excluir</button>
                <div style="display:flex; gap:10px; margin-left: auto;">
                    <button class="btn secondary" id="btn-cancel-modal">Cancelar</button>
                    <button class="btn primary" id="btn-save-char" style="background:#2ECC71; border-color:#27ae60; color:#000;">Salvar Personagem</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts Base -->
    <script src="bg_parallax.js"></script>
    <script src="apollo_quests.js"></script>
    <!-- Scripts La Plata -->
    <script src="laplata_roster.js"></script>
<script src="laplata_inventory.js"></script>
<script src="copilot_knowledge_base.js"></script>
<script src="apollo_copilot.js"></script>
<script src="apollo_quests.js"></script>

    <!-- APOLLO OS CORE (Auto-Injected) -->
    <script src="laplata_db.js"></script>
    <script src="laplata_settings.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="apollo_sfx.js"></script>
    <script src="apollo_notifications.js"></script>
    <script src="transfer_hud.js?v=11"></script>
    <script src="copilot_hud.js"></script>
    <script src="apollo_assistant.js"></script>
</body>
</html>
