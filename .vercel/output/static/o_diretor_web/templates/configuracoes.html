{% extends "base.html" %}
{% block content %}
<div style="padding-bottom:10px; border-bottom:1px solid var(--border-color); margin-bottom:15px;">
    <h2 style="color:var(--accent);">⚙️ Configurações</h2>
</div>
<div style="display:flex; gap:20px; flex-wrap:wrap;">

    <!-- API Keys -->
    <div class="group-box" style="flex:1; min-width:320px;">
        <div class="group-title">🔑 Chaves de API</div>
        <div style="display:flex; flex-direction:column; gap:12px; padding-top:5px;">
            <div>
                <label style="font-size:12px; color:#aaa; display:block; margin-bottom:4px;">VoiceMaker API Key:</label>
                <input type="password" style="width:100%;" placeholder="Cole sua chave aqui...">
            </div>
            <div>
                <label style="font-size:12px; color:#aaa; display:block; margin-bottom:4px;">Google Gemini API Keys (uma por linha):</label>
                <textarea style="height:80px; font-size:11px; color:#0af;" placeholder="AIza...&#10;AIza...&#10;AIza..."></textarea>
            </div>
            <div>
                <label style="font-size:12px; color:#aaa; display:block; margin-bottom:4px;">OpenAI API Key:</label>
                <input type="password" style="width:100%;" placeholder="sk-...">
            </div>
            <div>
                <label style="font-size:12px; color:#aaa; display:block; margin-bottom:4px;">ElevenLabs API Key:</label>
                <input type="password" style="width:100%;" placeholder="Cole sua chave aqui...">
            </div>
        </div>
    </div>

    <!-- Configurações de Personagens -->
    <div class="group-box" style="flex:2; min-width:400px;">
        <div class="group-title">👥 Configurações de Personagens</div>
        <div style="font-size:12px; color:#888; margin-bottom:10px;">Selecione um personagem para editar suas configurações</div>
        <div class="row" style="margin-bottom:15px;">
            <label style="width:100px;">Personagem:</label>
            <select id="cfg_personagem" style="flex:1;" onchange="carregarPersonagem(this.value)">
                <option>Rafael Descargas</option>
                <option>Mona Cansada</option>
            </select>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px; background:#111; border:1px solid #333; border-radius:4px; padding:12px;">
            <div class="row">
                <label style="width:140px;">🗣️ Voz (VoiceMaker):</label>
                <input type="text" class="flex-1" value="ai3-Rodrigo">
            </div>
            <div class="row">
                <label style="width:140px;">🌍 Idioma:</label>
                <select style="flex:1;"><option>pt-BR</option><option>en-US</option></select>
            </div>
            <div class="row">
                <label style="width:140px;">🎭 Engine:</label>
                <select style="flex:1;"><option>ProPlus</option><option>Neural</option><option>Standard</option></select>
            </div>
            <div class="row">
                <label style="width:140px;">🎬 Vídeo Base:</label>
                <input type="text" id="cfg_video_base" class="flex-1" readonly placeholder="Caminho do vídeo do personagem...">
                <button class="btn outline" onclick="browseFile('cfg_video_base','video')">📁</button>
            </div>
            <div class="row">
                <label style="width:140px;">🔊 Volume Ajuste:</label>
                <input type="range" min="-20" max="20" value="0" style="flex:1;">
                <span style="width:50px; text-align:right;">0 dB</span>
            </div>
        </div>
    </div>

    <!-- Caminhos do Sistema -->
    <div class="group-box" style="flex:1; min-width:320px;">
        <div class="group-title">📂 Caminhos do Sistema</div>
        <div style="display:flex; flex-direction:column; gap:10px; padding-top:5px;">
            <div>
                <label style="font-size:12px; color:#aaa; display:block; margin-bottom:4px;">Pasta de Saída Padrão:</label>
                <div class="row">
                    <input type="text" id="cfg_saida" class="flex-1" readonly placeholder="Pasta de saída dos vídeos...">
                    <button class="btn outline" onclick="browseDir('cfg_saida')">📁</button>
                </div>
            </div>
            <div>
                <label style="font-size:12px; color:#aaa; display:block; margin-bottom:4px;">Pasta de Transições:</label>
                <div class="row">
                    <input type="text" id="cfg_trans" class="flex-1" readonly value="G:\YOUTUBE\DESCARGA NEWS NOTICIAS\Imagens Transição">
                    <button class="btn outline" onclick="browseDir('cfg_trans')">📁</button>
                </div>
            </div>
            <div>
                <label style="font-size:12px; color:#aaa; display:block; margin-bottom:4px;">Pasta de Logomarcas:</label>
                <div class="row">
                    <input type="text" id="cfg_logo" class="flex-1" readonly value="G:\YOUTUBE\DESCARGA NEWS NOTICIAS\Logo Descarga Noticias">
                    <button class="btn outline" onclick="browseDir('cfg_logo')">📁</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Configurações Gerais -->
    <div class="group-box" style="flex:1; min-width:320px;">
        <div class="group-title">🎛️ Preferências Gerais</div>
        <div style="display:flex; flex-direction:column; gap:10px; padding-top:5px;">
            <label><input type="checkbox" checked> Normalizar áudio automaticamente (-10 LUFS)</label>
            <label><input type="checkbox" checked> Usar compressor de áudio (Rádio Voice)</label>
            <label><input type="checkbox" checked> Smart Pacing (remover silêncios)</label>
            <label><input type="checkbox"> Audio Ducking (baixar música na fala)</label>
            <hr style="border-color:#333;">
            <div>
                <label style="font-size:12px; color:#aaa; display:block; margin-bottom:4px;">Target LUFS:</label>
                <div class="row">
                    <input type="range" min="-30" max="-5" value="-10" style="flex:1;" oninput="document.getElementById('lufs_lbl').textContent=this.value+' LUFS'">
                    <span id="lufs_lbl" style="width:70px; text-align:right;">-10 LUFS</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Botões de Ação -->
<div style="display:flex; gap:10px; margin-top:20px; justify-content:flex-end;">
    <button class="btn outline">↺ Redefinir Padrões</button>
    <button class="btn primary" style="padding:10px 30px;" onclick="salvarConfig()">💾 Salvar Configurações</button>
</div>

<div id="cfg-status" style="color:#22c55e; font-size:13px; text-align:right; margin-top:8px; display:none;">
    ✅ Configurações salvas com sucesso!
</div>

<script>
async function browseFile(id, type) {
    const r = await fetch(`/api/browse_file?type=${type}`);
    const d = await r.json();
    if (d.path) document.getElementById(id).value = d.path;
}
async function browseDir(id) {
    const r = await fetch('/api/browse_dir');
    const d = await r.json();
    if (d.path) document.getElementById(id).value = d.path;
}
function salvarConfig() {
    const st = document.getElementById('cfg-status');
    st.style.display = 'block';
    setTimeout(() => st.style.display = 'none', 3000);
    // TODO: POST /api/salvar_config
}
function carregarPersonagem(nome) { /* TODO */ }
</script>
{% endblock %}
