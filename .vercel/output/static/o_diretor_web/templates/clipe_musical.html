{% extends "base.html" %}
{% block content %}
<div style="padding-bottom:10px; border-bottom:1px solid var(--border-color); margin-bottom:15px;">
    <h2 style="color:var(--accent);">🎵 Clipe Musical — Música + Vídeos</h2>
</div>
<div style="display:flex; gap:20px;">
    <!-- LEFT: Configurações -->
    <div class="group-box" style="flex:1; display:flex; flex-direction:column; gap:15px;">
        <div class="group-title">🎵 Configurações</div>

        <div>
            <label style="font-size:12px; color:#aaa;">🎵 Música de Fundo:</label>
            <div class="row" style="margin-top:6px;">
                <button class="btn primary" onclick="browseFile('cm_musica_path','audio')">📂 Selecionar Música</button>
                <input type="text" id="cm_musica_path" class="flex-1" readonly placeholder="Nenhuma música selecionada">
            </div>
        </div>

        <div>
            <label style="font-size:12px; color:#aaa;">🔊 Volume da Música (%):</label>
            <div class="row" style="margin-top:6px;">
                <input type="range" id="cm_vol" min="0" max="100" value="50" style="flex:1;" oninput="document.getElementById('cm_vol_lbl').textContent=this.value">
                <span id="cm_vol_lbl" style="width:30px; text-align:right; font-weight:bold;">50</span>
            </div>
        </div>

        <div>
            <label style="font-size:12px; color:#aaa;">📐 Formato de Saída:</label>
            <div class="row" style="margin-top:6px;">
                <label><input type="radio" name="cm_formato" value="horizontal"> Horizontal</label>
                <label><input type="radio" name="cm_formato" value="vertical"> Vertical</label>
                <label><input type="radio" name="cm_formato" value="ambos" checked> Ambos</label>
            </div>
        </div>

        <div>
            <label style="font-size:12px; color:#aaa;">⏱️ Duração Máxima Vertical (s):</label>
            <input type="number" value="60" style="width:80px; margin-top:6px;">
        </div>

        <button class="btn primary" style="padding:12px; font-size:16px; margin-top:auto;" onclick="gerarClipe()">
            🎬 Gerar Clipe Musical
        </button>
        <div id="cm-status" style="color:#888; font-size:12px; text-align:center;">
            Status: Aguardando configurações...
        </div>
    </div>

    <!-- RIGHT: Seleção de Vídeos -->
    <div class="group-box" style="flex:2; display:flex; flex-direction:column;">
        <div class="group-title">🎬 Seleção de Vídeos</div>

        <div style="display:flex; gap:8px; margin-bottom:12px;">
            <button class="btn primary" onclick="addVideo()">📂 Selecionar Vídeos</button>
            <button class="btn" style="background:#5a1a1a; border-color:#c0392b;" onclick="removeSelected()">🗑️ Remover</button>
            <button class="btn outline" onclick="clearAll()">🔄 Limpar</button>
        </div>

        <div id="cm-video-list" style="flex:1; overflow-y:auto; background:#111; border:1px solid #333; border-radius:5px; padding:10px; min-height:350px;">
            <div style="color:#555; text-align:center; margin-top:80px;">
                <div style="font-size:32px; margin-bottom:10px;">🎬</div>
                Nenhum vídeo adicionado.
            </div>
        </div>
        <div id="cm-count" style="color:#888; font-size:11px; margin-top:8px;">0 vídeos selecionados</div>
    </div>
</div>

<script>
    let videos = []; let selectedIdx = -1;
    async function browseFile(id, type) {
        const r = await fetch(`/api/browse_file?type=${type}`);
        const d = await r.json();
        if (d.path) document.getElementById(id).value = d.path;
    }
    async function addVideo() {
        const r = await fetch('/api/browse_file?type=video');
        const d = await r.json();
        if (d.path) { videos.push(d.path); render(); }
    }
    function removeSelected() { if (selectedIdx>=0) { videos.splice(selectedIdx,1); selectedIdx=-1; render(); } }
    function clearAll() { videos=[]; selectedIdx=-1; render(); }
    function render() {
        const el = document.getElementById('cm-video-list');
        document.getElementById('cm-count').textContent = videos.length + ' vídeos selecionados';
        if (!videos.length) { el.innerHTML='<div style="color:#555;text-align:center;margin-top:80px;"><div style="font-size:32px;margin-bottom:10px;">🎬</div>Nenhum vídeo adicionado.</div>'; return; }
        el.innerHTML = videos.map((p,i)=>`<div onclick="sel(${i})" style="padding:8px;border:1px solid ${i===selectedIdx?'#0af':'#333'};border-radius:4px;margin-bottom:5px;background:${i===selectedIdx?'#0a1a2a':'#1a1a1a'};cursor:pointer;display:flex;align-items:center;gap:10px;">
            <span style="color:#f59e0b;">🎬</span>
            <span style="font-size:12px;flex:1;">${p.split('\\').pop()}</span>
        </div>`).join('');
    }
    function sel(i) { selectedIdx=i; render(); }
    function gerarClipe() {
        if (!document.getElementById('cm_musica_path').value) { alert('⚠️ Selecione uma música!'); return; }
        if (!videos.length) { alert('⚠️ Selecione pelo menos um vídeo!'); return; }
        document.getElementById('cm-status').textContent='Status: Gerando clipe musical...';
        document.getElementById('cm-status').style.color='#f59e0b';
    }
</script>
{% endblock %}
