<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo - O Roteirista Pro</title>
    <link rel="stylesheet" href="global_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <script src="laplata_db.js"></script>
    <script src="laplata_settings.js"></script>
    <script src="laplata_ai.js"></script>

    <style>
        :root {
            --bg-base: #0f172a;
            --bg-sidebar: rgba(30, 41, 59, 0.7);
            --brand-primary: #8b5cf6;
            --brand-secondary: #c084fc;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --paper-bg: #1e293b;
            --paper-text: #f1f5f9;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top left, #1e1b4b, var(--bg-base));
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Topbar Premium */
        .apollo-topbar-pro {
            height: 60px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 100;
        }
        .topbar-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 600; transition: color 0.2s; }
        .back-btn:hover { color: var(--brand-secondary); }
        .topbar-left h1 { margin: 0; font-size: 18px; font-weight: 900; letter-spacing: 0.5px; background: linear-gradient(to right, #c084fc, #8b5cf6); -webkit-background-clip: text; color: transparent; }

        .topbar-right { display: flex; gap: 12px; }
        .btn-pro {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .btn-pro:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
        .btn-pro.primary { background: linear-gradient(135deg, #8b5cf6, #6d28d9); border-color: #a78bfa; color: white; box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
        .btn-pro.primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(139, 92, 246, 0.5); }

        .editor-container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar Glassmorphism */
        .sidebar-pro {
            width: 280px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 10;
        }
        .sidebar-title { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--brand-secondary); margin: 0 0 8px 0; font-weight: 900; }
        .sidebar-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }

        .ai-tools-list { display: flex; flex-direction: column; gap: 12px; flex: 1; }
        
        .ai-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #e2e8f0;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ai-btn:hover { background: rgba(139, 92, 246, 0.15); border-color: var(--brand-secondary); transform: translateX(4px); }
        .ai-btn::before { content: '✨'; font-size: 14px; }
        .ai-btn.rewrite::before { content: '📝'; }
        .ai-btn.grammar::before { content: '🔍'; }

        .tone-selector { margin-top: auto; }
        .tone-selector label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .tone-selector select { width: 100%; background: rgba(0,0,0,0.4); color: white; border: 1px solid var(--border-color); padding: 10px; border-radius: 6px; font-family: 'Inter'; font-size: 13px; outline: none; transition: border-color 0.2s; }
        .tone-selector select:focus { border-color: var(--brand-primary); }

        /* Workspace Central */
        .workspace-pro {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PGRlZnM+PHBhdHRlcm4gaWQ9ImciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgcGF0dGVyblVuaXRzPSJ1c2VyU3BhY2VPblVzZSI+PHBhdGggZD0iTTAgNDBoNDBWMEgwem0yMCAyMGMxMS4wNDYgMCAyMC04Ljk1NCAyMC0yMFMyMC45NTQgMCAyMCAwIDAgOC45NTQgMCAyMHM4Ljk1NCAyMCAyMCAyMHoiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wMikiIGZpbGwtcnVsZT0iZXZlbm9kZCIvPjwvcGF0dGVybj48L2RlZnM+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0idXJsKCNnKSIvPjwvc3ZnPg==') var(--bg-base);
            position: relative;
        }

        /* Customizando Quill Toolbar para Dark Mode */
        .ql-toolbar.ql-snow {
            background: rgba(15, 23, 42, 0.9) !important;
            border: none !important;
            border-bottom: 1px solid var(--border-color) !important;
            padding: 12px 24px !important;
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
        }
        .ql-snow .ql-picker, .ql-snow .ql-stroke { color: var(--text-main) !important; stroke: var(--text-main) !important; }
        .ql-snow .ql-fill, .ql-snow .ql-stroke.ql-fill { fill: var(--text-main) !important; }
        .ql-snow .ql-picker-options { background: var(--paper-bg) !important; border-color: var(--border-color) !important; }

        /* Scroll Area do Documento */
        .document-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* O Documento A4 */
        #word-editor {
            background: var(--paper-bg) !important;
            color: var(--paper-text) !important;
            font-family: 'Merriweather', 'Times New Roman', serif;
            font-size: 16px;
            width: 21cm;
            min-height: 29.7cm;
            padding: 2.5cm 3cm;
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
            line-height: 1.8;
            border: none !important;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Floating Export Button */
        .fab-export {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .fab-export:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 35px rgba(236, 72, 153, 0.6);
        }
        .fab-export::before { content: '📦'; font-size: 18px; }

    </style>

<!-- APOLLO OS IFRAME CSS CLEANUP -->
<script>
    if (window.self !== window.top) {
        document.write('<style> body > header, .apollo-header, .topbar { display: none !important; } </style>');
    }
</script>

</head>
<body>
    
    <header class="apollo-topbar-pro">
        <div class="topbar-left">
            <a href="hub.html" class="back-btn">← HUB</a>
            <h1>O ROTEIRISTA PRO</h1>
        </div>
        <div class="topbar-right">
            <button id="btn-save-draft" class="btn-pro">Rascunho Local</button>
            <button id="btn-save-garagem" class="btn-pro primary">💾 Salvar Projeto (Garagem)</button>
        </div>
    </header>

    <main class="editor-container">
        
        <aside class="sidebar-pro">
            <div>
                <h3 class="sidebar-title">Inteligência Artificial</h3>
                <p class="sidebar-desc">Utilize o Motor Laplata para gerar, continuar e refinar seus roteiros com perfeição cinemática.</p>
                
                <div class="ai-tools-list">
                    <button id="btn-ia-continue" class="ai-btn">Continuar Texto Mágico</button>
                    <button id="btn-ia-rewrite" class="ai-btn rewrite">Reescrever Seleção</button>
                    <button id="btn-ia-grammar" class="ai-btn grammar">Revisão Avançada</button>
                </div>
            </div>

            <div class="tone-selector">
                <label>Direção de Arte (Tom)</label>
                <select id="ai-tone">
                    <option value="narrador">Narrador Padrão</option>
                    <option value="dramatico">Dramático / Épico</option>
                    <option value="misterio">Mistério / Suspense</option>
                    <option value="comedia">Comédia / Leve</option>
                    <option value="formal">Documentário / Formal</option>
                </select>
            </div>
        </aside>

        <section class="workspace-pro">
            <div class="document-scroll-area">
                <div id="word-editor">
                    <!-- Editor.js container -->
                </div>
            </div>
            
            <button onclick="exportToBagageiro()" class="fab-export">
                Mandar para o Bagageiro
            </button>
        </section>

    </main>

    <!-- Editor.js and Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/paragraph@latest"></script>

    <!-- Scripts Apollo -->
        <!-- Supabase SDK e Autenticao -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="apollo_sfx.js"></script>
    <script src="apollo_notifications.js"></script>
    <script src="transfer_hud.js?v=11"></script>
    <script src="copilot_hud.js"></script>
    <script src="editor_shared.js"></script>
    <script src="editor_texto.js"></script>
    <script src="apollo_assistant.js"></script>
</body>
</html>
