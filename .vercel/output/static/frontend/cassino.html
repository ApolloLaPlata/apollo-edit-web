<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cassino Apollo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0510;
            --panel-bg: #140b2e;
            --neon-purple: #8b5cf6;
            --neon-cyan: #00f0ff;
            --neon-gold: #fbbf24;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at center, rgba(139, 92, 246, 0.2) 0%, transparent 60%),
                repeating-linear-gradient(45deg, #0a0510, #0a0510 10px, #140b2e 10px, #140b2e 20px);
        }

        h1 {
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            margin-bottom: 20px;
            font-weight: 900;
            font-size: 3rem;
        }

        .machine {
            background: #1a0f3c;
            border: 4px solid var(--neon-gold);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(251, 191, 36, 0.4), inset 0 0 20px rgba(0,0,0,0.8);
            display: flex;
            gap: 15px;
            position: relative;
        }

        /* The glass window */
        .machine::after {
            content: '';
            position: absolute;
            top: 30px; left: 30px; right: 30px; bottom: 30px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
            border-radius: 10px;
        }

        .reel {
            width: 100px;
            height: 120px;
            background: #fff;
            border: 3px solid #333;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 10px 10px rgba(0,0,0,0.5), inset 0 -10px 10px rgba(0,0,0,0.5);
        }

        .symbols {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            transition: top cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        .symbol {
            width: 100px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: 70%;
            background-position: center;
            background-repeat: no-repeat;
        }

        .controls {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .spin-btn {
            padding: 20px 60px;
            font-size: 2rem;
            font-weight: 900;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #ff0055, #990033);
            border: 3px solid #ff0055;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 0 #660022, 0 0 30px rgba(255, 0, 85, 0.6);
            transition: transform 0.1s, box-shadow 0.1s, margin-top 0.1s;
        }

        .spin-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0 0 #660022, 0 0 10px rgba(255, 0, 85, 0.6);
        }

        .spin-btn:disabled {
            background: #555;
            border-color: #333;
            box-shadow: 0 10px 0 #222;
            cursor: not-allowed;
            color: #888;
        }

        #result {
            font-size: 2rem;
            color: var(--neon-gold);
            font-weight: bold;
            height: 40px;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }
    </style>
</head>
<body>

    <h1>Cassino Apollo</h1>

    <div class="machine">
        <div class="reel"><div class="symbols" id="reel1"></div></div>
        <div class="reel"><div class="symbols" id="reel2"></div></div>
        <div class="reel"><div class="symbols" id="reel3"></div></div>
    </div>

    <div class="controls">
        <div id="result">Puxe a Alavanca!</div>
        <button class="spin-btn" id="spin-btn" onclick="spin()">GIRAR</button>
    </div>

    <script>
        const symbolsList = [
            'url("assets/final_icons/helmet.png")',
            'url("assets/final_icons/glove.png")',
            'url("assets/final_icons/suit.png")',
            'url("assets/final_icons/badge.png")',
            'url("assets/final_pieces/engine.png")',
            'url("assets/final_pieces/wheel.png")'
        ];
        
        const prizeNames = {
            'url("assets/peca_engrenagem.png")': "Engrenagens",
            'url("assets/peca_bateria.png")': "Baterias",
            'url("assets/peca_chave.png")': "Chaves",
            'url("assets/peca_pneu.png")': "Pneus",
            'url("assets/peca_cristal.png")': "Cristais Sombrios!",
            'url("assets/peca_carro.png")': "JACKPOT: CARRO NOVO!"
        };

        const reels = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3')
        ];

        const symbolHeight = 120;
        const loops = 5; // How many times it loops before stopping
        
        // Initialize reels with a huge strip of random symbols
        function initReels() {
            reels.forEach(reel => {
                reel.innerHTML = '';
                // Create a long strip
                for(let i=0; i<30; i++) {
                    const div = document.createElement('div');
                    div.className = 'symbol';
                    div.style.backgroundImage = symbolsList[Math.floor(Math.random() * symbolsList.length)];
                    reel.appendChild(div);
                }
                reel.style.top = '0px';
                reel.style.transition = 'none';
            });
        }
        initReels();

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playSpin() {
            try {
                if (!audioCtx) audioCtx = new AudioContext();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 1);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 1);
            } catch(e){}
        }

        function playWin() {
            try {
                if (!audioCtx) audioCtx = new AudioContext();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.2);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.4);
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.6);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 1);
            } catch(e){}
        }

        function spin() {
            const btn = document.getElementById('spin-btn');
            const res = document.getElementById('result');
            btn.disabled = true;
            res.innerText = "Girando...";
            
            playSpin();

            // First, reset all reels without transition
            reels.forEach(reel => {
                reel.style.transition = 'none';
                reel.style.top = '0px';
                
                // Shuffle bottom symbols so they are different each time
                const children = Array.from(reel.children);
                for(let i=0; i<30; i++) {
                    children[i].style.backgroundImage = symbolsList[Math.floor(Math.random() * symbolsList.length)];
                }
            });

            // Force reflow
            void reels[0].offsetWidth;

            // Pick targets (indices from the bottom of the list)
            const targetIndices = [
                25 + Math.floor(Math.random() * 4),
                25 + Math.floor(Math.random() * 4),
                25 + Math.floor(Math.random() * 4)
            ];

            // Sometimes force a win for demo purposes (10% chance)
            if(Math.random() < 0.1) {
                const winBg = symbolsList[Math.floor(Math.random() * symbolsList.length)];
                targetIndices.forEach((target, rIdx) => {
                    reels[rIdx].children[target].style.backgroundImage = winBg;
                });
            }

            const results = [];

            reels.forEach((reel, i) => {
                // Apply transition
                // Delay each reel slightly for classic effect
                const delay = i * 0.5;
                const duration = 2 + delay;
                reel.style.transition = `top ${duration}s cubic-bezier(0.1, 0.8, 0.1, 1)`;
                
                const targetY = - (targetIndices[i] * symbolHeight);
                reel.style.top = targetY + 'px';

                results.push(reel.children[targetIndices[i]].style.backgroundImage);
            });

            // Wait for last reel to stop
            setTimeout(() => {
                if (results[0] === results[1] && results[1] === results[2]) {
                    res.innerText = `GRANDE PRÊMIO: ${prizeNames[results[0]]}!!!`;
                    playWin();
                } else if (results[0] === results[1] || results[1] === results[2] || results[0] === results[2]) {
                    res.innerText = "Quase lá! Tente de novo!";
                } else {
                    res.innerText = "Mais Sorte na Próxima!";
                }
                btn.disabled = false;
            }, 3500);
        }
    </script>
</body>
</html>
