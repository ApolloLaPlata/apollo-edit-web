<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo - Editor de Áudio IA</title>
    <link rel="stylesheet" href="editor_audio.css">
    <link rel="stylesheet" href="editor_shared.css">
    <style>
        :root {
            --bg-dark: #0f0f11;
            --bg-darker: #0a0a0c;
            --brand-accent: #6b21a8;
            --text-light: #e0e0e0;
            --border-color: #2a2a2a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-light); overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .action-btn { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; transition: 0.2s; text-align: center; font-family: 'Inter', sans-serif; }
        .action-btn:hover { background: var(--brand-accent); }
    </style>

<!-- APOLLO OS IFRAME CSS CLEANUP -->
<script>
    if (window.self !== window.top) {
        document.write('<style> body > header, .apollo-header, .topbar { display: none !important; } </style>');
    }
</script>

</head>
<body>

    <!-- Header -->
    <header style="height: 60px; background: var(--bg-darker); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; justify-content: space-between;">
        <h2 style="font-family: 'Impact'; color: var(--brand-accent); letter-spacing: 2px;">APOLLO AUDIO & MUSIC STUDIO</h2>
        
        <div>
            <button id="btn-upload" class="action-btn" style="background: var(--brand-accent);">Importar Áudio</button>
            <input type="file" id="file-upload" accept="audio/*" style="display: none;">
        </div>
    </header>

    <main class="editor-container">
        
        <!-- Sidebar Esquerda: Ferramentas I.A. -->
        <aside class="editor-sidebar" id="sidebar-tools">
            <h3>I.A. Tratamento</h3>
            <button id="btn-ia-silence" class="action-btn" style="border: 1px solid #00ffcc; color: #00ffcc; background: transparent;">Remover Silêncio Auto</button>
            <button id="btn-ia-master" class="action-btn" style="border: 1px solid #00ffcc; color: #00ffcc; background: transparent;">Tratamento Mágico (Voz)</button>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 15px 0;">
            
            <h3 style="color: #ff00ff;">Gerador de Música</h3>
            <textarea id="music-prompt" placeholder="Ex: Batida de Lo-Fi suave para fundo..." style="width: 100%; height: 80px; background: #222; color: #fff; border: 1px solid #444; padding: 5px; resize: none; margin-bottom: 10px;"></textarea>
            <button id="btn-ia-music" class="action-btn" style="background: #ff00ff; color: #fff; font-weight: bold; width: 100%;">Gerar Trilha Bruta</button>
            
            <!-- Botão de Exportação -->
            <button onclick="exportToBagageiro()" class="action-btn" style="margin-top: auto; background: #6b21a8; width: 100%;">
                + Enviar p/ Bagageiro
            </button>
        </aside>

        <!-- Área Central de Edição (Waveform) -->
        <section class="editor-workspace" style="flex-grow: 1; display: flex; flex-direction: column; padding: 20px; background: #111;">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div style="display: flex; flex-direction: column;">
                    <h3 id="track-name" style="color: #888; font-size: 1.2em;">Nenhum arquivo carregado</h3>
                    <div style="display: flex; align-items: center; gap: 15px; margin-top: 5px;">
                        <span id="timecode-display" style="font-family: monospace; font-size: 2em; color: #00ffcc; background: #000; padding: 5px 10px; border-radius: 4px; border: 1px solid #333;">00:00:00:000</span>
                        
                        <div style="display: flex; align-items: center; gap: 10px; background: #1a1a1a; padding: 5px 15px; border-radius: 20px;">
                            <span style="font-size: 1.2em;">🔊</span>
                            <input type="range" id="master-volume" min="0" max="1" step="0.01" value="1" style="width: 100px;">
                        </div>
                    </div>
                </div>
                
                <div style="display: flex; gap: 10px;">
                    <button id="btn-play" class="action-btn" style="width: 60px; height: 60px; font-size: 1.5em; border-radius: 50%;">▶</button>
                    <button id="btn-pause" class="action-btn" style="width: 60px; height: 60px; font-size: 1.5em; border-radius: 50%;">⏸</button>
                </div>
            </div>

            <!-- Waveform Container -->
            <div id="waveform-container" style="width: 100%; height: 200px; background: #222; border-radius: 8px; border: 1px solid #333; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                <span id="waveform-placeholder" style="color: #555;">(Waveform aparecerá aqui)</span>
                <!-- Wavesurfer DOM irá injetar o canvas aqui -->
            </div>

            <!-- Ferramentas Manuais -->
            <div style="margin-top: 20px; display: flex; gap: 10px; background: #1a1a1a; padding: 15px; border-radius: 8px;">
                <button id="btn-trim-start" class="action-btn">✂ Definir Início</button>
                <button id="btn-trim-end" class="action-btn">✂ Definir Fim</button>
                <button id="btn-delete-section" class="action-btn" style="background: #8b0000;">🗑 Deletar Seleção</button>
            </div>
            
        </section>

    </main>

    <!-- Wavesurfer JS e Plugins (CDN mock para a visualização, no ambiente real estaria local) -->
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <script src="editor_shared.js"></script>
    <script src="editor_audio.js"></script>

    <!-- APOLLO OS CORE (Auto-Injected) -->
    <script src="laplata_db.js"></script>
    <script src="laplata_settings.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="apollo_sfx.js"></script>
    <script src="apollo_notifications.js"></script>
    <script src="transfer_hud.js?v=11"></script>
    <script src="copilot_hud.js"></script>
    <script src="apollo_assistant.js"></script>
</body>
</html>
