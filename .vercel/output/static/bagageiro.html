<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo | Meu Bagageiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/economy.css">
    <style>
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; margin-top: 20px; }
        .inv-slot { background: #16162a; border: 2px solid #1e1e3a; border-radius: 12px; padding: 15px; text-align: center; position: relative; cursor: pointer; transition: 0.2s; }
        .inv-slot:hover { border-color: #7c3aed; background: #1a1a33; transform: translateY(-3px); }
        .inv-slot .qty { position: absolute; top: -10px; right: -10px; background: #ef4444; color: white; font-weight: bold; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 12px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .inv-slot .icon { font-size: 3rem; margin-bottom: 10px; }
        .inv-slot .name { font-size: 0.85rem; font-weight: 600; color: #e2e8f0; line-height: 1.2; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="brand">APOLLO<span>HUB</span></div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-link"><span class="icon">🚀</span> A Oficina (Cloud)</a>
            <a href="banco.html" class="nav-link"><span class="icon">🏦</span> Casa da Moeda (Banco)</a>
            <a href="loja.html" class="nav-link"><span class="icon">🛒</span> Loja Oficial</a>
            <a href="mercado.html" class="nav-link"><span class="icon">🏴‍☠️</span> Mercado Negro</a>
            <a href="bagageiro.html" class="nav-link active"><span class="icon">💼</span> Meu Bagageiro</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="page-title">Meu Bagageiro</div>
            <div class="user-resources">
                <div class="resource-pill fuel"><span class="resource-icon">⛽</span><span class="value" id="res-fuel">100</span></div>
                <div class="resource-pill crystals"><span class="resource-icon">💎</span><span class="value" id="res-crystals">0</span></div>
                <div class="resource-pill gpus"><span class="resource-icon">🪙</span><span class="value" id="res-coins">0</span></div>
                <div class="profile-btn"></div>
            </div>
        </header>

        <div class="economy-header">
            <h1 class="economy-title">Seu Inventário (Mochila)</h1>
            <p class="economy-desc">Consumíveis, Nitros e Peças compradas na Loja ficam armazenados aqui até o momento de usá-los.</p>
        </div>

        <div class="economy-section">
            <h2 class="section-title-sm"><span class="icon">📦</span> Consumíveis & Boosters</h2>
            <div class="inventory-grid" id="inventory-grid">
                <p style="color:#64748b; font-size:14px;">Carregando itens...</p>
            </div>
        </div>
    </main>

    <script src="laplata_inventory.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderInventory();
            updateHeaderResources();
        });

        function updateHeaderResources() {
            if (!window.ApolloEconomy) return;
            const res = window.ApolloEconomy.getResources();
            document.getElementById('res-coins').innerText = res.coins || 0;
            document.getElementById('res-crystals').innerText = res.crystals || 0;
            document.getElementById('res-fuel').innerText = res.fuel || 100;
        }

        function renderInventory() {
            const grid = document.getElementById('inventory-grid');
            if (!window.ApolloEconomy) {
                grid.innerHTML = '<p style="color:red;">Erro: Economia offline.</p>';
                return;
            }
            
            const inv = window.ApolloEconomy.getInventory();
            const items = Object.entries(inv).filter(([k, v]) => v > 0);
            
            if (items.length === 0) {
                grid.innerHTML = '<p style="color:#64748b; font-size:14px; grid-column:1/-1;">Sua mochila está vazia. Visite a Loja.</p>';
                return;
            }
            
            grid.innerHTML = '';
            
            // Dicionário de visual dos itens
            const itemDict = {
                'nitro_t4': { name: 'Nitro GPU T4', icon: '⚡' },
                'nitro_a100': { name: 'Nitro Master A100', icon: '🚀' },
                'copilot_turbo': { name: 'Chip Copiloto Turbo', icon: '🤖' }
            };
            
            items.forEach(([key, qty]) => {
                const info = itemDict[key] || { name: key, icon: '📦' };
                const slot = document.createElement('div');
                slot.className = 'inv-slot';
                slot.innerHTML = `
                    <div class="qty">${qty}</div>
                    <div class="icon">${info.icon}</div>
                    <div class="name">${info.name}</div>
                `;
                slot.onclick = () => alert(`Você possui ${qty}x ${info.name}. Eles serão consumidos automaticamente nas ferramentas (Render, Chatbot, etc).`);
                grid.appendChild(slot);
            });
        }
    </script>
</body>
</html>
