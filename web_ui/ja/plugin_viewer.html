html
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Apollo Edit Pro — Ferramenta Externa</title>
<link href="favicon.png" rel="icon" type="image/png"/>
<link href="../global_style.css" rel="stylesheet"/>
<style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #0f172a;
        }
        .cockpit-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: #1e293b;
            border-bottom: 4px solid var(--app-theme, #9B59B6); /* Dynamic Theme Color */
            height: 60px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .cockpit-title {
            color: #fff;
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .cockpit-iframe-container {
            height: calc(100vh - 60px);
            width: 100%;
            background: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loading-overlay {
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.8);
            color: #FFD32A;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
<header class="cockpit-header">
<div class="cockpit-title">
<span id="app-icon">🌐</span>
<span id="app-title">Carregando Ferramenta...</span>
</div>
<div style="display:flex; gap:10px;">
<button class="btn" id="btn-reload" onclick="reloadIframe()" style="background: transparent; border: 1px solid var(--app-theme, #555); color: var(--app-theme, #fff);">🔄 Recarregar</button>
<button class="btn" id="btn-back" onclick="window.location.href='hub.html'" style="background: var(--app-theme, #9B59B6); color: #fff; border: none;">🔙 Voltar ao Hub</button>
</div>
</header>
<div class="loading-overlay" id="loading">
<h2>🔌 Conectando ao Servidor Python...</h2>
<p id="loading-url" style="color:#aaa; font-size:0.9rem;">Aguarde, estabelecendo conexão com o localhost.</p>
</div>
<div class="cockpit-iframe-container">
<iframe id="plugin-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" src=""></iframe>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const app = params.get('app');
            const iframe = document.getElementById('plugin-iframe');
            const loadingUrl = document.getElementById('loading-url');
            const title = document.getElementById('app-title');
            const icon = document.getElementById('app-icon');

            let targetUrl = '';
            let themeColor = '#9B59B6'; // Default Purple

            if (app === 'story') {
                targetUrl = localStorage.getItem('apollo_plugin_story_url') || 'http://127.0.0.1:5000';
                title.innerText = 'Gerador de Histórias';
                icon.innerText = '🖼️';
                themeColor = '#F59E0B'; // Yellow/Orange
            } else if (app === 'news') {
                targetUrl = localStorage.getItem('apollo_plugin_news_url') || 'http://127.0.0.1:5001';
                title.innerText = 'Gerador de Notícias';
                icon.innerText = '📰';
                themeColor = '#3B82F6'; // Blue
            } else {
                title.innerText = 'App Desconhecido';
                loadingUrl.innerText = 'URL Inválida.';
                return;
            }

            // Apply theme color
            document.documentElement.style.setProperty('--app-theme', themeColor);
            title.style.color = themeColor;
            document.getElementById('loading').style.color = themeColor;

            loadingUrl.innerText = `Acessando: ${targetUrl}`;
            
            // Set iframe src
            iframe.src = targetUrl;

            // Hide loading overlay after some time or when iframe loads
            iframe.onload = () => {
                document.getElementById('loading').style.opacity = '0';
            };

            // Failsafe timeout
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
            }, 3000);
        });

        function reloadIframe() {
            document.getElementById('loading').style.opacity = '1';
            const iframe = document.getElementById('plugin-iframe');
            iframe.src = iframe.src;
        }
    </script>
<script src="../auth.js"></script>
</body>
</html>
