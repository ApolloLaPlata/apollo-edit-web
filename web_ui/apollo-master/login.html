<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo Master - Restrito</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #4c1d95, #000);
        }
        .master-panel {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 1rem;
            padding: 3rem;
            box-shadow: 0 0 50px -12px rgba(139, 92, 246, 0.5);
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
        }
        .input-master {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: white;
            transition: all 0.3s ease;
        }
        .input-master:focus {
            border-color: #8b5cf6;
            outline: none;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.3);
        }
        .btn-master {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            transition: all 0.3s ease;
        }
        .btn-master:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.4);
        }
    </style>
</head>
<body>

    <div class="master-panel text-center">
        <h1 class="text-4xl font-black mb-2 tracking-tighter">APOLLO <span class="text-purple-500">MASTER</span></h1>
        <p class="text-purple-300 mb-8 text-sm">Sistema Central de Gestão SaaS</p>
        
        <form id="loginForm" class="space-y-5">
            <div>
                <input type="password" id="master_password" required
                    class="w-full input-master rounded-lg px-4 py-3 focus:ring-2"
                    placeholder="Código de Acesso Central">
            </div>
            
            <div id="errorMsg" class="hidden text-red-400 text-sm mt-2 text-left bg-red-900 bg-opacity-20 p-2 rounded border border-red-800">
                Acesso negado. O incidente foi registrado.
            </div>

            <button type="submit" 
                class="w-full btn-master text-white font-bold rounded-lg px-4 py-3 mt-4 tracking-wider uppercase text-sm">
                Desbloquear Central
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('master_password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                // Reaproveitamos a rota de admin login antiga por simplicidade, ou criamos uma nova em admin_api
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                });
                
                const data = await response.json();
                
                if(response.ok && data.success) {
                    localStorage.setItem('apollo_master_token', data.token);
                    window.location.href = '/apollo-master';
                } else {
                    errorMsg.classList.remove('hidden');
                    document.getElementById('master_password').value = '';
                }
            } catch (error) {
                console.error('Erro', error);
                errorMsg.textContent = "Falha de conexão com a infraestrutura.";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
