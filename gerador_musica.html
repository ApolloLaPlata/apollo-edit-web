<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo AI - Music & SFX Generator</title>
    <style>
        :root {
            --bg-dark: #0f111a;
            --panel-bg: rgba(20, 24, 39, 0.7);
            --brand-accent: #8b5cf6;
            --brand-accent-hover: #7c3aed;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(139, 92, 246, 0.3);
        }
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            background: radial-gradient(circle at 50% 0%, #2e1065 0%, var(--bg-dark) 50%);
            font-family: 'Inter', sans-serif; display: flex; flex-direction: column; 
            color: var(--text-main);
        }
        .apollo-header { 
            height: 60px; background: rgba(15, 17, 26, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center; padding: 0 30px; 
            border-bottom: 1px solid var(--border-color); 
        }
        .apollo-title { color: #fff; font-weight: 800; margin: 0; font-size: 18px; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .apollo-title span { background: linear-gradient(90deg, #c4b5fd, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .main-container {
            display: flex; flex: 1; padding: 40px; justify-content: center; align-items: flex-start; gap: 40px;
        }

        .generator-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: #e2e8f0; margin-bottom: 8px; }
        
        textarea, select {
            width: 100%; padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); color: white; font-family: inherit; font-size: 14px;
            outline: none; transition: border 0.2s; box-sizing: border-box;
        }
        textarea { resize: vertical; min-height: 100px; }
        textarea:focus, select:focus { border-color: var(--brand-accent); }

        .generate-btn {
            background: linear-gradient(135deg, var(--brand-accent), #6d28d9);
            color: white; border: none; padding: 16px 24px; border-radius: 8px; cursor: pointer;
            font-weight: bold; font-size: 16px; width: 100%; transition: transform 0.2s, box-shadow 0.2s;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4); }

        .result-panel {
            background: var(--panel-bg); backdrop-filter: blur(12px); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 30px; width: 100%; max-width: 400px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            opacity: 0.5; /* Opacity until generated */
            pointer-events: none;
        }

        .result-panel.active { opacity: 1; pointer-events: all; }

        .vinyl-record {
            width: 150px; height: 150px; border-radius: 50%; background: #111;
            border: 4px solid #333; margin-bottom: 20px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }
        .vinyl-record.spin { animation: spin 4s linear infinite; }
        .vinyl-center { width: 50px; height: 50px; border-radius: 50%; background: var(--brand-accent); }
        .vinyl-hole { width: 10px; height: 10px; border-radius: 50%; background: #000; position: absolute; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .audio-player { width: 100%; margin-bottom: 20px; }
        .audio-player audio { width: 100%; height: 40px; outline: none; }

        .btn-bagageiro {
            background: #22c55e; color: white; border: none; padding: 10px 20px; border-radius: 6px; 
            cursor: pointer; font-weight: bold; font-size: 14px; width: 100%;
            transition: background 0.2s;
        }
        .btn-bagageiro:hover { background: #16a34a; }

        .loading-spinner {
            display: none; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite;
        }
        
    </style>

<!-- APOLLO OS IFRAME CSS CLEANUP -->
<script>
    if (window.self !== window.top) {
        document.write('<style> body > header, .apollo-header, .topbar { display: none !important; } </style>');
    }
</script>

</head>
<body>
    <script src="laplata_db.js"></script>
    <script src="laplata_settings.js"></script>
        <!-- Supabase SDK e Autenticao -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="apollo_sfx.js"></script>
    <script src="apollo_notifications.js"></script>
    <script src="transfer_hud.js?v=11"></script>
    <script src="copilot_hud.js"></script>

    <header class="apollo-header">
        <h3 class="apollo-title">🎵 Apollo <span>Music & SFX Generator</span></h3>
        <div>
            <a href="hub.html" style="color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 600;">Voltar ao Hub</a>
        </div>
    </header>

    <main class="editor-container" style="flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center;">
        <h2 style="font-size: 32px; font-weight: 900; margin-bottom: 10px; background: linear-gradient(to right, #c084fc, #8b5cf6); -webkit-background-clip: text; color: transparent;">Motor de Geração Musical AI</h2>
        <p style="color: var(--text-muted); margin-bottom: 40px; max-width: 600px;">Descreva a música ou os efeitos sonoros que você deseja. Nosso sistema de IA processará seu pedido usando seus créditos de combustível e enviará o resultado diretamente para o seu Bagageiro.</p>
        
        <div style="background: var(--paper-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 30px; width: 100%; max-width: 700px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <textarea id="music-prompt" rows="4" placeholder="Ex: Uma trilha sonora épica de suspense com tambores tribais e violinos frenéticos, 120 BPM..." style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; padding: 15px; font-family: 'Inter'; font-size: 16px; outline: none; resize: vertical; margin-bottom: 20px;"></textarea>
            
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div style="text-align: left;">
                    <label style="display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px;">Duração (Segundos)</label>
                    <input type="number" id="music-duration" value="15" min="5" max="120" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: white; padding: 8px; width: 80px; text-align: center; font-family: 'Inter';">
                </div>
                <div style="text-align: left;">
                    <span style="font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 5px;">Custo Estimado</span>
                    <span style="font-size: 16px; font-weight: bold; color: #ec4899;">⛽ 30 Créditos</span>
                </div>
                <button id="btn-generate-music" class="btn-pro primary" style="padding: 12px 30px; font-size: 16px; border-radius: 8px;" onclick="simulateAIGeneration()">🎵 Gerar Música</button>
            </div>
        </div>
    </main>

    <script>
        function simulateAIGeneration() {
            const prompt = document.getElementById('music-prompt').value;
            if (!prompt) return alert('Por favor, descreva a música primeiro.');
            
            const btn = document.getElementById('btn-generate-music');
            btn.innerText = "⏳ Processando...";
            btn.style.background = "#555";
            btn.style.pointerEvents = "none";
            
            if (window.showToast) window.showToast("Iniciando motor de IA... Consumindo combustível", "#ec4899");
            
            setTimeout(() => {
                btn.innerText = "🎵 Gerar Música";
                btn.style.background = "";
                btn.style.pointerEvents = "all";
                if (window.apolloTransferOS) { window.apolloTransferOS.addItem("audio", "musica_ia.wav", "Gerador de Musica", null, { url: "/dummy_music.m4a" }); }

                if (window.showToast) window.showToast("✅ Geração Concluída! Arquivo salvo no Bagageiro.", "#00ffcc");
            }, 3000);
        }
    </script>

    <!-- Bruxelinha AI Assistant -->
    <script src="apollo_assistant.js"></script>
</body>
</html>
